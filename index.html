<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Test Platformasi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f4ff;--bg2:#e8eeff;--bg3:#dde5ff;--card:#ffffff;--card2:#f5f8ff;
  --border:rgba(79,120,255,0.14);--border2:rgba(79,120,255,0.28);
  --primary:#3a6fff;--primary-dark:#2558e8;--primary-glow:rgba(58,111,255,0.22);
  --accent:#8b5cf6;--success:#059669;--success-bg:#d1fae5;--success-border:#6ee7b7;
  --error:#dc2626;--error-bg:#fee2e2;--error-border:#fca5a5;
  --warn:#d97706;--warn-bg:#fef3c7;--warn-border:#fcd34d;
  --text:#1a2340;--text2:#4a5878;--text3:#8899bb;
  --shadow:0 2px 16px rgba(58,111,255,0.08);--shadow2:0 4px 28px rgba(58,111,255,0.13);
  --r:18px;--r2:13px;--r3:10px;
}
html{scroll-behavior:smooth;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(58,111,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(58,111,255,0.035) 1px,transparent 1px);background-size:32px 32px;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:300px;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(58,111,255,0.06) 0%,transparent 100%);}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);}
.orb1{width:420px;height:420px;top:-100px;right:-80px;background:rgba(139,92,246,0.08);}
.orb2{width:360px;height:360px;bottom:-80px;left:-80px;background:rgba(58,111,255,0.07);}
#subjectBg{position:fixed;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;font-size:clamp(40px,14vw,100px);font-weight:900;color:rgba(58,111,255,0.04);letter-spacing:6px;user-select:none;pointer-events:none;text-align:center;padding:20px;}

#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.load-ring-wrap{position:relative;width:60px;height:60px;}
.load-ring{position:absolute;inset:0;border:3px solid rgba(58,111,255,0.12);border-top-color:var(--primary);border-radius:50%;animation:spin .85s linear infinite;}
.load-ring2{position:absolute;inset:10px;border:3px solid transparent;border-bottom-color:var(--accent);border-radius:50%;animation:spin 1.3s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;font-weight:600;color:var(--text3);}

.header{position:sticky;top:0;z-index:90;background:rgba(240,244,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:58px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 12px rgba(58,111,255,0.07);}
.uinfo{display:flex;align-items:center;gap:10px;min-width:0;}
.uavatar{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0;box-shadow:0 4px 12px var(--primary-glow);}
.uname{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.usubj{font-size:11px;font-weight:600;color:var(--primary);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.timer{display:flex;align-items:center;gap:7px;background:white;border:1.5px solid var(--border2);padding:7px 15px;border-radius:28px;font-size:15px;font-weight:800;color:var(--primary);font-family:'JetBrains Mono',monospace;flex-shrink:0;transition:all .3s;box-shadow:var(--shadow);}
.timer svg{width:13px;height:13px;}
.timer.warn{color:var(--error);border-color:var(--error-border);background:var(--error-bg);animation:tp 1s ease infinite;}
@keyframes tp{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.15);}50%{box-shadow:0 0 0 6px rgba(220,38,38,0);}}

.prog-wrap{position:sticky;top:58px;z-index:89;background:rgba(240,244,255,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 16px 12px;}
.prog-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.qnum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(32px,1fr));gap:5px;}
.qbtn{width:100%;aspect-ratio:1;border:none;border-radius:8px;background:var(--card);color:var(--text3);font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;border:1px solid var(--border);}
.qbtn:hover{background:var(--bg3);color:var(--text2);}
.qbtn.answered{background:#d1fae5;color:var(--success);border-color:var(--success-border);}
.qbtn.active{border-color:var(--primary);color:var(--primary);background:#eff4ff;box-shadow:0 0 0 2px rgba(58,111,255,0.15);}
.qbtn.correct-mark{background:#d1fae5;color:var(--success);border-color:var(--success-border);}
.qbtn.wrong-mark{background:#fee2e2;color:var(--error);border-color:var(--error-border);}

.container{position:relative;z-index:1;padding:16px 16px 140px;max-width:640px;margin:0 auto;}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;animation:fadeUp .22s ease;box-shadow:var(--shadow2);position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qnum-badge{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--primary);text-transform:uppercase;background:#eff4ff;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);}
.qtype-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.qtype-open{background:rgba(139,92,246,0.1);color:var(--accent);border:1px solid rgba(139,92,246,0.2);}
.qtype-open-scored{background:rgba(5,150,105,0.1);color:var(--success);border:1px solid var(--success-border);}
.qtype-key{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);}
.qtext{font-size:17px;font-weight:700;line-height:1.75;color:var(--text);}
.qimg{width:100%;border-radius:12px;margin-top:14px;border:1px solid var(--border);max-height:280px;object-fit:contain;cursor:zoom-in;transition:transform .15s;}
.qimg:active{transform:scale(0.98);}
/* ── Lightbox ── */
#imgLightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#imgLightbox.open{display:flex;}
#lbImg{max-width:96vw;max-height:90vh;object-fit:contain;border-radius:12px;box-shadow:0 8px 60px rgba(0,0,0,0.6);touch-action:pinch-zoom;}
#lbClose{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#lbHint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:12px;font-weight:600;white-space:nowrap;}

.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:15px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .16s;font-size:15px;font-weight:600;color:var(--text2);box-shadow:var(--shadow);}
.opt:hover{background:var(--card2);border-color:var(--primary);color:var(--text);transform:translateX(3px);}
.opt:active{transform:scale(0.985);}
.opt-l{width:32px;height:32px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text3);flex-shrink:0;transition:all .16s;border:1px solid var(--border);}
.opt.selected{border-color:var(--primary);background:#eff4ff;color:var(--text);}
.opt.selected .opt-l{background:var(--primary);color:white;border-color:transparent;box-shadow:0 3px 10px var(--primary-glow);}
.opt.correct-r{border-color:var(--success-border);background:var(--success-bg);color:var(--success);}
.opt.correct-r .opt-l{background:var(--success);color:white;border-color:transparent;}
.opt.wrong-r{border-color:var(--error-border);background:var(--error-bg);color:var(--error);}
.opt.wrong-r .opt-l{background:var(--error);color:white;border-color:transparent;}
.opt.dim-r{opacity:.22;cursor:default;pointer-events:none;}

/* ── KEY (yopiq, ishtirokchi javob yozadi) ── */
.key-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.key-hint{font-size:12px;font-weight:600;color:var(--warn);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--r3);padding:10px 14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.key-input-row{display:flex;gap:8px;}
.key-inp{flex:1;background:white;border:2px solid var(--border2);border-radius:var(--r2);padding:14px 16px;font-size:18px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);outline:none;transition:all .2s;letter-spacing:2px;box-shadow:var(--shadow);}
.key-inp::placeholder{color:var(--text3);font-size:14px;letter-spacing:0;font-family:'Sora',sans-serif;font-weight:500;}
.key-inp:focus{border-color:var(--warn);box-shadow:0 0 0 3px rgba(217,119,6,0.12);}
.key-inp:disabled{border-color:var(--border);background:var(--bg2);color:var(--text2);}
.key-save-btn{padding:0 18px;background:var(--warn-bg);color:var(--warn);border:2px solid var(--warn-border);border-radius:var(--r2);font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
.key-save-btn:hover{background:#fde68a;}
.key-save-btn:active{transform:scale(0.97);}
.key-save-btn:disabled{background:var(--bg3);color:var(--text3);border-color:var(--border);cursor:default;}
/* ── KEY natija (test yakunida ko'rinadi) ── */
.key-result{padding:12px 14px;border-radius:var(--r3);font-size:13px;font-weight:600;line-height:1.6;}
.key-result.ok{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);}
.key-result.bad{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border);}
.key-result.pending{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

.open-wrap{margin-top:4px;}
.open-ta{width:100%;background:white;border:2px solid var(--border);border-radius:var(--r2);padding:14px 16px;font-size:15px;font-family:inherit;font-weight:500;color:var(--text);outline:none;resize:none;min-height:110px;transition:border-color .2s;line-height:1.6;box-shadow:var(--shadow);}
.open-ta::placeholder{color:var(--text3);}
.open-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,0.1);}
.open-ta:disabled{border-color:var(--border);background:var(--bg2);}
.open-btn{margin-top:8px;width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--primary));color:white;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(139,92,246,0.25);}
.open-btn:hover{opacity:.9;}
.open-btn:active{transform:scale(0.98);}
.open-btn:disabled{background:linear-gradient(135deg,var(--success),#047857);box-shadow:none;cursor:default;}

/* ── OPEN-SCORED ── */
.open-scored-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.open-scored-hint{font-size:12px;font-weight:600;color:var(--success);background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--r3);padding:10px 14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.open-scored-ta{width:100%;background:white;border:2px solid var(--success-border);border-radius:var(--r2);padding:14px 16px;font-size:15px;font-family:inherit;font-weight:500;color:var(--text);outline:none;resize:none;min-height:120px;transition:border-color .2s;line-height:1.6;box-shadow:var(--shadow);}
.open-scored-ta::placeholder{color:var(--text3);}
.open-scored-ta:focus{border-color:var(--success);box-shadow:0 0 0 3px rgba(5,150,105,0.1);}
.open-scored-ta:disabled{border-color:var(--border);background:var(--bg2);color:var(--text2);}
.open-scored-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--success),#047857);color:white;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(5,150,105,0.25);}
.open-scored-btn:hover{opacity:.9;}
.open-scored-btn:active{transform:scale(0.98);}
.open-scored-btn:disabled{opacity:.6;cursor:default;}
.open-scored-result{border-radius:var(--r2);padding:14px 16px;font-size:13px;font-weight:600;line-height:1.65;border:1px solid transparent;}
.open-scored-result.ok{background:var(--success-bg);border-color:var(--success-border);}
.open-scored-result.partial{background:var(--warn-bg);border-color:var(--warn-border);}
.open-scored-result.bad{background:var(--error-bg);border-color:var(--error-border);}
.osr-top{display:flex;align-items:center;gap:10px;}
.osr-score{font-size:24px;font-weight:900;}
.osr-label{font-size:12px;opacity:.7;}
.osr-feedback{color:var(--text2);font-size:13px;margin-top:8px;line-height:1.6;font-weight:500;}
.osr-correct{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.07);font-size:12px;color:var(--text2);}

/* ── AI BANNER (tez orada) ── */
.ai-soon-banner{background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(58,111,255,0.08));border:1px solid rgba(124,58,237,0.2);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-top:6px;}
.ai-soon-icon{font-size:24px;flex-shrink:0;}
.ai-soon-text{font-size:12px;font-weight:600;color:var(--accent);line-height:1.5;}
.ai-soon-badge{display:inline-block;background:rgba(124,58,237,0.12);color:var(--accent);border:1px solid rgba(124,58,237,0.25);border-radius:20px;font-size:10px;font-weight:800;padding:2px 8px;margin-top:4px;}

.navbar{position:fixed;bottom:0;left:0;right:0;z-index:85;background:rgba(240,244,255,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 16px 26px;display:flex;gap:10px;box-shadow:0 -4px 20px rgba(58,111,255,0.08);}
.nbtn{flex:1;padding:14px;border:none;border-radius:var(--r2);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
.nb-prev{background:white;color:var(--text2);border:1.5px solid var(--border2);flex:0 0 85px;box-shadow:var(--shadow);}
.nb-prev:hover{background:var(--bg3);color:var(--text);}
.nb-next{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 18px var(--primary-glow);}
.nb-next:hover{box-shadow:0 6px 24px var(--primary-glow);}
.nb-finish{background:linear-gradient(135deg,var(--success),#047857);color:white;box-shadow:0 4px 18px rgba(5,150,105,0.25);}
.nbtn:active{transform:scale(0.97);}

#channelBanner{display:none;position:fixed;bottom:86px;left:16px;right:16px;z-index:200;background:linear-gradient(135deg,#1e3a8a,#312e81);border:1px solid rgba(99,102,241,0.3);border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 40px rgba(0,0,0,0.2);animation:slideUp .35s cubic-bezier(.34,1.4,.64,1);}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ban-x{position:absolute;top:10px;right:12px;background:rgba(255,255,255,0.15);border:none;color:rgba(255,255,255,0.7);width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ban-t{font-size:14px;font-weight:800;color:white;margin-bottom:3px;}
.ban-s{font-size:12px;font-weight:500;color:rgba(255,255,255,0.65);}

#resultOverlay{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);flex-direction:column;align-items:center;overflow-y:auto;}
.res-hero{width:100%;background:linear-gradient(160deg,#eff4ff 0%,#ede9fe 50%,#eff4ff 100%);padding:36px 24px 28px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(58,111,255,0.1) 0%,transparent 70%);pointer-events:none;}
.res-icon{font-size:66px;display:block;margin-bottom:16px;animation:popIn .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.res-pct{font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.res-score{font-size:15px;font-weight:600;color:var(--text2);margin-top:10px;}
.res-bar-bg{width:200px;height:5px;background:rgba(58,111,255,0.1);border-radius:4px;margin:16px auto 0;overflow:hidden;}
.res-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.res-msg{font-size:13px;color:var(--text2);margin-top:12px;font-style:italic;}
.res-actions{display:flex;gap:10px;padding:16px 16px 0;width:100%;max-width:640px;margin:0 auto;}
.btn-rating{flex:1;padding:13px;background:white;color:var(--primary);border:1.5px solid var(--border2);border-radius:var(--r2);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.btn-rating:hover{background:var(--bg3);}
.btn-save{flex:2;padding:13px;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;border:none;border-radius:var(--r2);font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px var(--primary-glow);}
.btn-save:active{transform:scale(0.98);}
.res-body{width:100%;max-width:640px;margin:0 auto;padding:14px 16px 40px;}
.res-sec-t{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.res-sec-t::after{content:'';flex:1;height:1px;background:var(--border);}
.res-list{display:flex;flex-direction:column;gap:7px;}
.rqi{border-radius:var(--r2);padding:13px 15px;font-size:13px;font-weight:600;line-height:1.55;display:flex;flex-direction:column;gap:5px;border:1px solid transparent;box-shadow:var(--shadow);}
.rqi.ok{background:var(--success-bg);border-color:var(--success-border);}
.rqi.bad{background:var(--error-bg);border-color:var(--error-border);}
.rqi.opn{background:#eff4ff;border-color:var(--border2);}
.rqi.key-q{background:var(--warn-bg);border-color:var(--warn-border);}
.rqi.partial{background:var(--warn-bg);border-color:var(--warn-border);}
.rqi-num{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.rqi-txt{color:var(--text2);font-size:12.5px;}
.rqi-ok{color:var(--success);font-size:12.5px;}
.rqi-err{color:var(--error);font-size:12.5px;}

#ratingModal{display:none;position:fixed;inset:0;z-index:300;background:rgba(30,40,80,0.45);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;}
.r-sheet{background:white;border-radius:22px 22px 0 0;border-top:1px solid var(--border);width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 40px rgba(58,111,255,0.1);}
.s-handle{width:38px;height:4px;background:var(--bg3);border-radius:4px;margin:12px auto 0;}
.s-title{font-size:16px;font-weight:800;color:var(--text);padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.r-tabs{display:flex;gap:6px;padding:12px 16px;}
.rtab{flex:1;padding:9px;border:none;border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all .15s;border:1px solid var(--border);}
.rtab.active{background:var(--primary);color:white;border-color:transparent;box-shadow:0 3px 12px var(--primary-glow);}
.r-list{flex:1;overflow-y:auto;padding:0 14px 16px;}
.rrow{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border);}
.rrow.me{background:#eff4ff;border-color:var(--border2);}
.rrank{width:26px;font-size:16px;text-align:center;flex-shrink:0;}
.rname{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.rscore-v{font-size:13px;font-weight:800;color:var(--primary);}
.rpct-v{font-size:11px;color:var(--text3);}
.s-close{margin:0 16px 14px auto;display:block;background:none;border:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;padding:4px 0;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div id="subjectBg"></div>

<div id="loading">
  <div class="load-ring-wrap"><div class="load-ring"></div><div class="load-ring2"></div></div>
  <div class="load-txt">Testlar yuklanmoqda...</div>
</div>

<header class="header" id="mainHeader" style="display:none">
  <div class="uinfo">
    <div class="uavatar" id="uav">A</div>
    <div><div class="uname" id="uname">Foydalanuvchi</div><div class="usubj" id="usubj"></div></div>
  </div>
  <div class="timer" id="timerBox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="timerTxt">120:00</span>
  </div>
</header>

<div class="prog-wrap" id="progWrap" style="display:none">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="qnum-grid" id="qnumGrid"></div>
</div>

<div class="container" id="quizUI" style="display:none">
  <div class="qcard">
    <div class="qmeta">
      <span class="qnum-badge" id="qLabel">SAVOL 1</span>
      <span id="qTypeBadge" class="qtype-badge" style="display:none"></span>
    </div>
    <div class="qtext" id="qText">Yuklanmoqda...</div>
    <img id="qImg" class="qimg" style="display:none" alt=""/>
  </div>
  <div class="opts" id="optWrap"></div>
</div>

<nav class="navbar" id="navBar" style="display:none">
  <button class="nbtn nb-prev" id="btnPrev" onclick="goTo(currentIdx-1)">← Orqaga</button>
  <button class="nbtn nb-next" id="btnNext">Keyingi →</button>
</nav>

<div id="imgLightbox" onclick="closeLightbox()">
  <button id="lbClose" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="" onclick="event.stopPropagation()"/>
  <div id="lbHint">👆 Yopish uchun bosing</div>
</div>

<div id="channelBanner">
  <button class="ban-x" onclick="document.getElementById('channelBanner').style.display='none'">✕</button>
  <div class="ban-t">📢 @IshtixonKimyo</div>
  <div class="ban-s">O'zbekistondagi eng yaxshi kimyo kanali! 🔬</div>
</div>

<div id="resultOverlay">
  <div class="res-hero">
    <span class="res-icon" id="resIcon">🏆</span>
    <div class="res-pct" id="resPct">0%</div>
    <div class="res-score" id="resSc">0 / 0 to'g'ri</div>
    <div class="res-bar-bg"><div class="res-bar-fill" id="resBarFill" style="width:0%"></div></div>
    <div class="res-msg" id="resMsg"></div>
  </div>
  <div class="res-actions">
    <button class="btn-rating" onclick="openRating()">🏆 Reyting</button>
    <button class="btn-save" id="btnSave" onclick="sendToBot()">✅ Natijani saqlash</button>
  </div>
  <div class="res-body">
    <div class="res-sec-t">✅ To'g'ri javoblar</div>
    <div class="res-list" id="correctList"></div>
    <div class="res-sec-t" style="margin-top:24px">❌ Xato / To'liqsiz javoblar</div>
    <div class="res-list" id="wrongList"></div>
  </div>
</div>

<div id="ratingModal" onclick="if(event.target===this)closeRating()">
  <div class="r-sheet">
    <div class="s-handle"></div>
    <div class="s-title">🏆 Top Reyting — <span id="rSubjLbl"></span></div>
    <div class="r-tabs">
      <button class="rtab active" onclick="switchTab('week',this)">📅 Haftalik</button>
      <button class="rtab" onclick="switchTab('month',this)">🗓 Oylik</button>
      <button class="rtab" onclick="switchTab('all',this)">🌐 Umumiy</button>
    </div>
    <div class="r-list" id="ratingList"><div style="text-align:center;padding:30px;color:var(--text3)">⏳ Yuklanmoqda...</div></div>
    <button class="s-close" onclick="closeRating()">✕ Yopish</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp||{expand:()=>{},enableClosingConfirmation:()=>{},initDataUnsafe:{},showAlert:m=>alert(m),showConfirm:(m,cb)=>{cb(confirm(m));},sendData:d=>console.log('sendData:',d),close:()=>{}};
tg.expand();tg.enableClosingConfirmation();

const REPO_RAW="https://raw.githubusercontent.com/toychijunaydullayev-del/WepApp/main/";
let questions=[],answers={},openScores={},openScoresFeedback={};
let currentIdx=0,isDone=false,timerSec=0,timerInt=null,finalScore=0;
let ratingPeriod='week',resultSent=false;
let ratingData={week:[],month:[],all:[]};
const LETTERS=['A','B','C','D','E','F'];
const params=new URLSearchParams(window.location.search);
const fileName=params.get('test')||'';
const mode=fileName.toLowerCase().startsWith('paid')?'paid':'free';
const tgUser=tg.initDataUnsafe?.user;
const userName=tgUser?(tgUser.first_name+(tgUser.last_name?' '+tgUser.last_name:'')):'Foydalanuvchi';
const userId=tgUser?.id||0;

function getSubject(fn){
  if(!fn)return'Test';
  const p=fn.replace('.json','').split('_'),last=p[p.length-1];
  const isTs=/^\d{7,}$/.test(last),parts=isTs?p.slice(2,p.length-1):p.slice(2);
  return parts.join(' ').replace(/_/g,' ').split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
const subjectName=getSubject(fileName);

function getTimerDuration(){
  const l=subjectName.toLowerCase();
  return(l.includes('pedmahorat')||l.includes('ped mahorat'))?36*60:120*60;
}

document.getElementById('uname').textContent=userName;
document.getElementById('uav').textContent=userName.charAt(0).toUpperCase();
document.getElementById('usubj').textContent=subjectName||'';
if(subjectName&&subjectName!=='Test')document.getElementById('subjectBg').textContent=subjectName.toUpperCase();

// Kanal banneri — 10 daqiqada bir marta
setInterval(()=>{
  if(!isDone){
    const b=document.getElementById('channelBanner');
    b.style.display='block';
    setTimeout(()=>{b.style.display='none';},60000);
  }
},10*60*1000);

// Test yuklanishi
fetch(REPO_RAW+fileName)
  .then(r=>{if(!r.ok)throw new Error('Fayl topilmadi: '+fileName);return r.json();})
  .then(data=>{
    questions=data;
    timerSec=getTimerDuration();
    document.getElementById('loading').style.display='none';
    document.getElementById('mainHeader').style.display='flex';
    document.getElementById('progWrap').style.display='';
    document.getElementById('quizUI').style.display='';
    document.getElementById('navBar').style.display='flex';
    buildQnums();startTimer();render();
    if(mode==='paid')setTimeout(()=>tg.showAlert('ℹ️ Bu pullik test. Faqat 1 marta ishlash imkoniyati bor!'),1500);
  })
  .catch(e=>{
    document.getElementById('loading').innerHTML=`<div style="text-align:center;padding:32px"><div style="font-size:52px">⚠️</div><p style="margin-top:14px;font-weight:800;color:var(--error);font-size:16px">Test yuklanmadi</p><p style="color:var(--text3);font-size:13px;margin-top:8px">${e.message}</p></div>`;
  });

function buildQnums(){
  const g=document.getElementById('qnumGrid');g.innerHTML='';
  questions.forEach((_,i)=>{
    const b=document.createElement('button');b.className='qbtn';b.id=`qn_${i}`;
    b.textContent=i+1;b.onclick=()=>goTo(i);g.appendChild(b);
  });
  updateQnums();
}

function updateQnums(){
  const ans=Object.keys(answers).filter(k=>answers[k]!==undefined&&answers[k]!=='').length;
  document.getElementById('progFill').style.width=(ans/questions.length*100)+'%';
  questions.forEach((_,i)=>{
    const b=document.getElementById(`qn_${i}`);if(!b)return;
    b.className='qbtn';
    if(isDone){
      const q=questions[i];
      const qt=getQType(q);
      if(qt==='open'){if(answers[i])b.classList.add('answered');}
      else if(qt==='open-scored'){
        const sc=openScores[i];
        if(sc!==undefined){sc>=50?b.classList.add('correct-mark'):b.classList.add('wrong-mark');}
        else if(answers[i])b.classList.add('answered');
      } else {
        // test yoki key
        const ua=(answers[i]||'').toString().toLowerCase().trim();
        const ca=(q.correct||'').toString().toLowerCase().trim();
        if(ua&&ua===ca)b.classList.add('correct-mark');
        else if(ua)b.classList.add('wrong-mark');
      }
    } else if(answers[i]!==undefined&&answers[i]!=='')b.classList.add('answered');
    if(i===currentIdx)b.classList.add('active');
  });
}

// ── Savol turini aniqlash (yagona funksiya) ──
function getQType(q){
  const t=(q.type||'').toLowerCase().trim();
  if(t==='key'||t==='yopiq')return'key';
  if(t==='open-scored')return'open-scored';
  if(t==='open')return'open';
  // type yo'q bo'lsa avtomatik
  if(q.options&&q.options.length>0)return'test';
  if(q.correct!==undefined&&q.correct!=='')return'key';
  return'open';
}

function startTimer(){
  updateTD();
  timerInt=setInterval(()=>{
    timerSec--;updateTD();
    if(timerSec<=0){clearInterval(timerInt);finalize();}
    if(timerSec<=300)document.getElementById('timerBox').classList.add('warn');
  },1000);
}
function updateTD(){
  const m=String(Math.floor(timerSec/60)).padStart(2,'0'),s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timerTxt').textContent=`${m}:${s}`;
}
function getElapsed(){return getTimerDuration()-timerSec;}

function render(){
  if(!questions.length)return;
  const q=questions[currentIdx];
  const total=questions.length;
  const uAns=answers[currentIdx];
  const qType=getQType(q);

  document.getElementById('qLabel').textContent=`SAVOL ${currentIdx+1} / ${total}`;

  const badge=document.getElementById('qTypeBadge');
  if(qType==='open'){badge.textContent='📝 Ochiq savol';badge.className='qtype-badge qtype-open';badge.style.display='';}
  else if(qType==='open-scored'){badge.textContent='✍️ Yozma (baholanadi)';badge.className='qtype-badge qtype-open-scored';badge.style.display='';}
  else if(qType==='key'){badge.textContent='✏️ Javob yozing';badge.className='qtype-badge qtype-key';badge.style.display='';}
  else badge.style.display='none';

  document.getElementById('qText').innerHTML=q.q||'';
  const img=document.getElementById('qImg');
  if(q.image&&q.image.startsWith('http')){
    img.src=q.image;
    img.style.display='block';
    img.onclick=()=>openLightbox(q.image);
  } else {
    img.style.display='none';
    img.onclick=null;
  }

  const wrap=document.getElementById('optWrap');
  wrap.innerHTML='';

  // ── OPEN ──
  if(qType==='open'){
    const d=document.createElement('div');d.className='open-wrap';
    const ta=document.createElement('textarea');ta.className='open-ta';
    ta.placeholder='✍️ Javobingizni shu yerga yozing...';ta.value=uAns||'';
    if(isDone||uAns)ta.disabled=true;
    const btn=document.createElement('button');btn.className='open-btn';
    if(isDone||uAns){btn.textContent='✅ Saqlangan';btn.disabled=true;}
    else btn.innerHTML='💾 Javobni saqlash';
    btn.onclick=()=>{
      const v=ta.value.trim();if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}
      answers[currentIdx]=v;btn.textContent='✅ Saqlangan';btn.disabled=true;ta.disabled=true;updateQnums();
    };
    d.appendChild(ta);d.appendChild(btn);

    // AI tez orada banneri
    if(isDone){
      const ab=document.createElement('div');ab.className='ai-soon-banner';
      ab.innerHTML=`<div class="ai-soon-icon">🤖</div><div class="ai-soon-text">Ustoz AI tez orada — bu savol bo'yicha izoh va tushuntirish olasiz!<br><span class="ai-soon-badge">✨ Tez orada</span></div>`;
      d.appendChild(ab);
    }
    wrap.appendChild(d);

  // ── OPEN-SCORED ──
  } else if(qType==='open-scored'){
    const osw=document.createElement('div');osw.className='open-scored-wrap';
    const hint=document.createElement('div');hint.className='open-scored-hint';
    hint.innerHTML='🎯 <span>Yozma javob — <b>Tekshirish</b> tugmasini bosing, AI ball beradi.</span>';
    osw.appendChild(hint);
    const ta=document.createElement('textarea');ta.className='open-scored-ta';
    ta.placeholder='✍️ To\'liq javobingizni yozing...';ta.value=uAns||'';
    const alreadyScored=openScores[currentIdx]!==undefined;
    if(isDone||alreadyScored)ta.disabled=true;
    osw.appendChild(ta);
    const btn=document.createElement('button');btn.className='open-scored-btn';
    if(alreadyScored){
      btn.textContent='✅ Baholangan';btn.disabled=true;
      osw.appendChild(btn);showOpenScoredResult(osw,currentIdx,q);
    } else if(isDone){
      btn.textContent='⏳ Tekshirilmagan';btn.disabled=true;btn.style.background='var(--text3)';osw.appendChild(btn);
    } else {
      btn.innerHTML='🤖 Tekshirish (AI bilan)';
      btn.onclick=async()=>{
        const v=ta.value.trim();if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}
        answers[currentIdx]=v;ta.disabled=true;btn.disabled=true;btn.innerHTML='⏳ Baholanmoqda...';
        updateQnums();
        // AI tez orada — hozircha 70 ball berib qo'yamiz, keyinchalik almashtiriladi
        openScores[currentIdx]=70;openScoresFeedback[currentIdx]='Ustoz AI tez orada ulangach aniq baho beriladi.';
        btn.textContent='✅ Baholangan';showOpenScoredResult(osw,currentIdx,q);updateQnums();
      };
      osw.appendChild(btn);
    }
    wrap.appendChild(osw);

  // ── KEY (variantsiz, ishtirokchi javob kiritadi) ──
  } else if(qType==='key'){
    const kw=document.createElement('div');kw.className='key-wrap';
    const hint=document.createElement('div');hint.className='key-hint';
    hint.innerHTML='✏️ <span>Javobingizni quyidagi maydonga kiriting va <b>Saqlash</b> tugmasini bosing.</span>';
    kw.appendChild(hint);

    const row=document.createElement('div');row.className='key-input-row';
    const inp=document.createElement('input');inp.type='text';inp.className='key-inp';
    inp.placeholder='Javobni kiriting...';

    const alreadyAnswered = uAns !== undefined && uAns !== '';

    if(alreadyAnswered){inp.value=uAns;inp.disabled=true;}

    const saveBtn=document.createElement('button');saveBtn.className='key-save-btn';
    if(isDone||alreadyAnswered){
      saveBtn.textContent='✅ OK';saveBtn.disabled=true;
    } else {
      saveBtn.textContent='💾 Saqlash';
    }

    saveBtn.onclick=()=>{
      const v=inp.value.trim();if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}
      answers[currentIdx]=v;
      saveBtn.textContent='✅ OK';saveBtn.disabled=true;inp.disabled=true;
      updateQnums();
      // Agar test tugagan bo'lsa natijani ko'rsat
      if(isDone) showKeyResult(kw,v,q.correct);
    };
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveBtn.click();}});
    row.appendChild(inp);row.appendChild(saveBtn);kw.appendChild(row);

    // Natija — faqat test tugaganda ko'rsat
    if(isDone && alreadyAnswered){
      showKeyResult(kw, uAns, q.correct);
    } else if(alreadyAnswered && !isDone){
      // Test davomida — faqat saqlanganini ko'rsat, javob yashirilgan
      const saved=document.createElement('div');saved.className='key-result pending';
      saved.textContent='💾 Javob saqlandi — natija test yakunida ko\'rinadi.';
      kw.appendChild(saved);
    }
    wrap.appendChild(kw);

  // ── TEST (A, B, C, D variantlar) ──
  } else {
    const correct=(q.correct||'').toString().toLowerCase().trim();
    (q.options||[]).forEach((val,i)=>{
      const vs=(val||'').toString();
      const isSel=uAns===vs;
      const isC=vs.toLowerCase().trim()===correct;
      const d=document.createElement('div');d.className='opt';
      if(isDone){if(isC)d.classList.add('correct-r');else if(isSel)d.classList.add('wrong-r');else d.classList.add('dim-r');}
      else if(isSel)d.classList.add('selected');
      const lt=document.createElement('span');lt.className='opt-l';lt.textContent=LETTERS[i]||i+1;
      const tx=document.createElement('span');tx.textContent=vs;
      d.appendChild(lt);d.appendChild(tx);
      if(!isDone)d.onclick=()=>{answers[currentIdx]=vs;render();updateQnums();};
      wrap.appendChild(d);
    });

    // AI tez orada — xato javob bo'lsa
    if(isDone){
      const ua=(uAns||'').toString().toLowerCase().trim();
      if(ua && ua !== correct){
        const ab=document.createElement('div');ab.className='ai-soon-banner';ab.style.marginTop='12px';
        ab.innerHTML=`<div class="ai-soon-icon">🤖</div><div class="ai-soon-text">Ustoz AI tez orada — nima uchun xato qilganingizni tushuntiradi!<br><span class="ai-soon-badge">✨ Tez orada</span></div>`;
        wrap.appendChild(ab);
      }
    }
  }

  const btnP=document.getElementById('btnPrev'),btnN=document.getElementById('btnNext');
  btnP.style.visibility=currentIdx===0?'hidden':'visible';
  if(isDone){
    if(currentIdx<total-1){btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=()=>goTo(currentIdx+1);}
    else{btnN.textContent='📊 Natija';btnN.className='nbtn nb-finish';btnN.onclick=()=>document.getElementById('resultOverlay').style.display='flex';}
  } else {
    if(currentIdx===total-1){btnN.textContent='✅ Yakunlash';btnN.className='nbtn nb-finish';btnN.onclick=nextOrFinish;}
    else{btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=nextOrFinish;}
  }
  updateQnums();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showOpenScoredResult(container,idx,q){
  const sc=openScores[idx];if(sc===undefined)return;
  const fb=openScoresFeedback[idx]||'';
  const ex=container.querySelector('.open-scored-result');if(ex)ex.remove();
  const cls=sc>=80?'ok':sc>=50?'partial':'bad';
  const emoji=sc>=80?'🌟':sc>=50?'📝':'❌';
  const label=sc>=80?"A'lo":sc>=50?'Qoniqarli':'Yetarli emas';
  const res=document.createElement('div');res.className=`open-scored-result ${cls}`;
  res.innerHTML=`<div class="osr-top"><span class="osr-score">${emoji} ${sc}/100</span><span class="osr-label">${label}</span></div>`;
  if(fb){const f=document.createElement('div');f.className='osr-feedback';f.textContent=fb;res.appendChild(f);}
  if(q.correct&&sc<80){const c=document.createElement('div');c.className='osr-correct';c.innerHTML=`📚 <b>Namuna javob:</b> ${q.correct}`;res.appendChild(c);}
  container.appendChild(res);
}

function showKeyResult(container, userVal, correct){
  const ex=container.querySelector('.key-result');if(ex)ex.remove();
  if(correct===undefined||correct==='')return;
  const isOk=userVal.toLowerCase().trim()===correct.toString().toLowerCase().trim();
  const res=document.createElement('div');
  res.className='key-result '+(isOk?'ok':'bad');
  res.innerHTML=isOk
    ?`✅ To'g'ri! Javob: <b>${correct}</b>`
    :`❌ Xato! To'g'ri javob: <b>${correct}</b> &nbsp;·&nbsp; Sizniki: <b>${userVal}</b>`;
  container.appendChild(res);
}

function goTo(i){if(i<0||i>=questions.length)return;currentIdx=i;render();}

function nextOrFinish(){
  if(isDone){goTo(currentIdx+1);return;}
  if(currentIdx<questions.length-1){goTo(currentIdx+1);return;}
  const u=questions.filter((_,i)=>answers[i]===undefined||answers[i]==='').length;
  if(u>0)tg.showConfirm(`⚠️ ${u} ta savolga javob bermagansiz. Yakunlaysizmi?`,ok=>{if(ok)finalize();});
  else finalize();
}

function finalize(){
  isDone=true;clearInterval(timerInt);
  document.getElementById('channelBanner').style.display='none';
  finalScore=0;

  // Ballar hisoblash
  const closedQs=[];
  questions.forEach((q,i)=>{
    const qt=getQType(q);
    if(qt==='open'||qt==='open-scored')return;
    closedQs.push(i);
    const ca=(q.correct||'').toString().toLowerCase().trim();
    const ua=(answers[i]||'').toString().toLowerCase().trim();
    if(ua&&ua===ca)finalScore++;
  });

  const osTotal=questions.filter(q=>getQType(q)==='open-scored').length;
  const osGained=Object.values(openScores).reduce((a,b)=>a+b,0);

  const totalPts=closedQs.length*100+osTotal*100;
  const gainedPts=finalScore*100+osGained;
  const pct=totalPts>0?Math.round((gainedPts/totalPts)*100):0;

  let icon,msg;
  if(pct>=90){icon='🏆';msg='Ajoyib natija! Zo\'r bilim! 🚀';}
  else if(pct>=75){icon='🌟';msg='Yaxshi natija! Davom eting! 💪';}
  else if(pct>=50){icon='📈';msg='O\'rtacha natija. Takrorlang! 📚';}
  else{icon='💡';msg='Har urinish o\'stiradi! 🌱';}

  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resPct').textContent=pct+'%';
  let scoreStr=`${finalScore}/${closedQs.length} test to'g'ri`;
  if(osTotal>0)scoreStr+=` · ${osGained}/${osTotal*100} yozma ball`;
  document.getElementById('resSc').textContent=scoreStr;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('rSubjLbl').textContent=subjectName;
  setTimeout(()=>{document.getElementById('resBarFill').style.width=pct+'%';},200);

  // Natijalar ro'yxati
  const cL=document.getElementById('correctList'),wL=document.getElementById('wrongList');
  cL.innerHTML='';wL.innerHTML='';

  questions.forEach((q,i)=>{
    const qt=getQType(q);
    const ca=(q.correct||'').toString();
    const ua=answers[i]||'';
    const short=(q.q||'').substring(0,110)+((q.q||'').length>110?'...':'');

    if(qt==='open'){
      const d=document.createElement('div');d.className='rqi opn';
      d.innerHTML=`<div class="rqi-num">📝 ${i+1}-savol • Ochiq</div><div class="rqi-txt">${short}</div><div style="color:var(--primary);font-size:12.5px">✍️ Javobingiz: <b>${ua||'Yozilmagan'}</b></div>`;
      cL.appendChild(d);return;
    }

    if(qt==='open-scored'){
      const sc=openScores[i],fb=openScoresFeedback[i]||'';
      const cls=sc===undefined?'opn':sc>=80?'ok':sc>=50?'partial':'bad';
      const d=document.createElement('div');d.className=`rqi ${cls}`;
      d.innerHTML=`<div class="rqi-num">✍️ ${i+1}-savol • Yozma</div><div class="rqi-txt">${short}</div>`;
      if(sc!==undefined){
        d.innerHTML+=`<div class="${sc>=50?'rqi-ok':'rqi-err'}">Ball: ${sc}/100${fb?' — '+fb:''}</div>`;
        if(ca&&sc<80)d.innerHTML+=`<div class="rqi-ok">📚 Namuna: ${ca}</div>`;
      }else{d.innerHTML+=`<div style="color:var(--text3);font-size:12px">⚪ Baholanmagan</div>`;}
      (sc!==undefined&&sc>=50?cL:wL).appendChild(d);return;
    }

    // test va key
    const isOk=ua.toString().toLowerCase().trim()===ca.toLowerCase().trim();
    const d=document.createElement('div');
    d.className=`rqi ${isOk?'ok':(qt==='key'?'key-q':'bad')}`;
    const typeLabel=qt==='key'?' • Yopiq savol':'';
    d.innerHTML=`<div class="rqi-num">${isOk?'✅':(qt==='key'?'✏️':'❌')} ${i+1}-savol${typeLabel}</div><div class="rqi-txt">${short}</div>`;
    if(isOk){
      d.innerHTML+=`<div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
    } else {
      d.innerHTML+=`<div class="rqi-err">${ua?'❌ Siz: '+ua:'⚪ Javob berilmagan'}</div>`;
      if(ca)d.innerHTML+=`<div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
    }
    (isOk?cL:wL).appendChild(d);
  });

  if(!cL.children.length)cL.innerHTML='<div style="color:var(--text3);padding:8px;font-size:13px">—</div>';
  if(!wL.children.length)wL.innerHTML='<div style="color:var(--success);padding:10px;font-size:13px;font-weight:600">🎉 Barcha javoblar to\'g\'ri!</div>';

  document.getElementById('resultOverlay').style.display='flex';
  updateQnums();render();
}

// ── Natijani botga yuborish ──
// Bot handler quyidagi JSON formatni kutadi:
// {
//   action: "test_result",
//   user_id: 123456,
//   user_name: "Ali",
//   score: 25,          // to'g'ri javoblar soni (test+key)
//   total: 35,          // jami savollar (test+key)
//   percent: 71,        // foiz
//   subject: "Kimyo",
//   file_name: "xxx.json",
//   time_sec: 1234,     // sarflangan vaqt (soniya)
//   wrong_q: [2,5,7],   // xato savol raqamlari
//   open_answers: {},   // ochiq javoblar
//   open_scores: {},    // open-scored ballari
//   mode: "free"|"paid"
// }
function sendToBot(){
  if(resultSent){tg.showAlert('✅ Natija allaqachon saqlangan!');return;}

  const wrong=[];
  const closedQs=questions.filter((q,i)=>{
    const qt=getQType(q);
    if(qt==='open'||qt==='open-scored')return false;
    const ca=(q.correct||'').toString().toLowerCase().trim();
    const ua=(answers[i]||'').toString().toLowerCase().trim();
    if(ua!==ca)wrong.push(i+1);
    return true;
  });

  const openAns={};
  questions.forEach((q,i)=>{
    const qt=getQType(q);
    if(qt==='open')openAns[i]={text:answers[i]||''};
    if(qt==='open-scored')openAns[i]={text:answers[i]||'',score:openScores[i]||0,feedback:openScoresFeedback[i]||''};
  });

  // Umumiy foiz
  const osGained=Object.values(openScores).reduce((a,b)=>a+b,0);
  const osTotal=questions.filter(q=>getQType(q)==='open-scored').length;
  const totalPts=closedQs.length*100+osTotal*100;
  const gainedPts=finalScore*100+osGained;
  const pct=totalPts>0?Math.round((gainedPts/totalPts)*100):0;

  const payload={
    action:'test_result',
    user_id:userId,
    user_name:userName,
    score:finalScore,
    total:closedQs.length,
    percent:pct,
    open_scores:openScores,
    subject:subjectName,
    file_name:fileName,
    time_sec:getElapsed(),
    wrong_q:wrong,
    open_answers:openAns,
    mode
  };

  try{
    tg.sendData(JSON.stringify(payload));
    resultSent=true;
    const btn=document.getElementById('btnSave');
    if(btn){btn.textContent='✅ Saqlandi';btn.disabled=true;btn.style.opacity='0.7';}
    tg.close();
  }catch(e){
    tg.showAlert('⚠️ Natijani yuborishda xato: '+e.message);
  }
}

function openRating(){document.getElementById('ratingModal').style.display='flex';renderRating(ratingPeriod);}
function closeRating(){document.getElementById('ratingModal').style.display='none';}
function switchTab(p,btn){
  ratingPeriod=p;
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderRating(p);
}
function renderRating(p){
  const list=document.getElementById('ratingList'),data=ratingData[p]||[];
  if(!data.length){
    list.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">📊 Ma\'lumotlar yo\'q.<br><small>Natijani saqlang — reyting paydo bo\'ladi</small></div>';
    return;
  }
  list.innerHTML='';
  data.forEach((row,i)=>{
    const isMe=row.user_id===userId||row.name===userName;
    const d=document.createElement('div');d.className='rrow'+(isMe?' me':'');
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<b>${i+1}</b>`;
    const pct=row.total>0?Math.round(row.score/row.total*100):0;
    d.innerHTML=`<span class="rrank">${medal}</span><span class="rname">${row.name}${isMe?' <span style="color:var(--primary);font-size:11px">(Siz)</span>':''}</span><div><div class="rscore-v">${row.score}/${row.total}</div><div class="rpct-v">${pct}%</div></div>`;
    list.appendChild(d);
  });
}
// ── Lightbox (rasm kattalashtirish) ──
function openLightbox(src){
  document.getElementById('lbImg').src=src;
  const lb=document.getElementById('imgLightbox');
  lb.classList.add('open');
  // Swipe pastga yopish
  let startY=0;
  lb.ontouchstart=e=>{startY=e.touches[0].clientY;};
  lb.ontouchmove=e=>{if(e.touches[0].clientY-startY>80)closeLightbox();};
}
function closeLightbox(){
  const lb=document.getElementById('imgLightbox');
  lb.classList.remove('open');
  lb.ontouchstart=null;lb.ontouchmove=null;
}
// ESC bilan yopish
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
