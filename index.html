<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rash Tekshiruv</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #f3f4f6;
            --q-bg: #e8f5e9; /* Och yashil */
            --primary: #0088cc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        
        /* Xira Reklama */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 32px; color: rgba(0,0,0,0.03); z-index: -1; font-weight: 900; white-space: nowrap; pointer-events: none; }

        /* Header */
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .user-block { display: flex; flex-direction: column; }
        #userName { font-size: 24px; font-weight: 900; color: #1a1a1a; margin-bottom: 2px; }
        .sub-text { font-size: 12px; color: #888; }
        
        .timer-box { padding: 6px 12px; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; transition: 0.5s; }
        .t-blue { background: #3b82f6; }
        .t-yellow { background: #f59e0b; }
        .t-red { background: #ef4444; }

        /* Matrix (5 qatorli setka) */
        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; background: white; border-bottom: 1px solid #eee; }
        .matrix-item { aspect-ratio: 1; border-radius: 8px; border: none; background: #e0f2fe; color: #0369a1; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .matrix-item.active { box-shadow: 0 0 0 3px var(--primary); }
        .matrix-item.done { background: var(--success) !important; color: white; }
        .matrix-item.wrong { background: var(--error) !important; color: white; }

        /* Test Content */
        .container { padding: 15px; }
        .question-card { background: var(--q-bg); padding: 20px; border-radius: 18px; border: 1px solid #c8e6c9; min-height: 180px; }
        #qText { font-size: 18px; font-weight: 600; line-height: 1.4; color: #1b5e20; }
        
        .options-list { margin-top: 20px; }
        .option { background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 2px solid transparent; transition: 0.2s; font-size: 16px; }
        .option.selected { border-color: var(--primary); background: white; font-weight: bold; }

        /* Nav & Bottom */
        .nav-bar { display: flex; gap: 10px; padding: 15px; position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-prev { background: #eee; color: #555; }
        .btn-next { background: var(--primary); color: white; }
        .btn-finish { background: var(--success); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; }

        /* Result Page */
        #resultPage { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 30px; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .res-badge { font-size: 100px; margin-bottom: 10px; }

        /* Loading Screen */
        #loader { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 2000; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div id="loader">Yuklanmoqda...</div>
    <div class="watermark">RASH_TEKSHIRUV KANALI</div>

    <div class="header">
        <div class="user-block">
            <div id="userName">Foydalanuvchi</div>
            <div class="sub-text">Test savollari</div>
        </div>
        <div id="timer" class="timer-box t-blue">00:00:00</div>
        <button class="btn-finish" onclick="askFinish()">Yakunlash</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>

    <div class="container" id="quizUI">
        <div class="question-card">
            <div id="qText">Savol yuklanmoqda...</div>
            <div class="options-list" id="options"></div>
        </div>
    </div>

    <div class="nav-bar" id="navBar">
        <button class="btn btn-prev" onclick="move(-1)">⬅️ Oldingi</button>
        <button class="btn btn-next" onclick="move(1)">Keyingi ➡️</button>
    </div>

    <div id="resultPage">
        <div class="res-badge">🎊</div>
        <h1 id="resScore">0 / 0</h1>
        <h2 id="resPercent">0%</h2>
        <p id="resMotivation" style="font-size: 18px; color: #555; margin: 20px 0;"></p>
        <div style="background: #fdf2f2; padding: 15px; border-radius: 12px; font-size: 14px; border: 1px solid #fee2e2;">
            💡 Xatolarni to'g'rilash va qaysi yo'nalishda xato qilganingizni tushunish uchun <b>AI yordamchisiga</b> murojaat qiling.
        </div>
        <button class="btn btn-next" style="margin-top: 30px; width: 100%;" onclick="tg.close()">Botga qaytish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); // WebApp tayyorligini bildirish (ochilishni tezlashtiradi)

        let currentIdx = 0;
        let questions = [];
        let answers = {};
        let isDone = false;
        let timeLeft = 0;

        document.getElementById('userName').innerText = tg.initDataUnsafe.user?.first_name || "O'quvchi";

        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if(fileName) {
            fetch(fileName)
                .then(r => r.json())
                .then(data => {
                    questions = data;
                    timeLeft = questions.length * 60;
                    document.getElementById('loader').style.display = 'none';
                    startTimer();
                    updateUI();
                })
                .catch(() => { document.getElementById('loader').innerText = "Xato: Fayl topilmadi!"; });
        }

        function updateUI() {
            if(!questions.length) return;
            const q = questions[currentIdx];
            document.getElementById('qText').innerText = q.t;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            ['a','b','c','d'].forEach(k => {
                const item = document.createElement('div');
                item.className = `option ${answers[currentIdx] === k.toUpperCase() ? 'selected' : ''}`;
                item.innerText = `${k.toUpperCase()}) ${q[k]}`;
                item.onclick = () => { if(!isDone) { answers[currentIdx] = k.toUpperCase(); updateUI(); } };
                optDiv.appendChild(item);
            });
            renderMatrix();
        }

        function renderMatrix() {
            const m = document.getElementById('matrix');
            m.innerHTML = '';
            questions.forEach((_, i) => {
                const btn = document.createElement('div');
                btn.className = `matrix-item ${i === currentIdx ? 'active' : ''}`;
                if(isDone) {
                    btn.classList.add(answers[i] === questions[i].ans ? 'done' : 'wrong');
                } else if(answers[i]) {
                    btn.classList.add('done');
                }
                btn.innerText = i + 1;
                btn.onclick = () => { 
                    if(isDone) tg.showAlert(`Savol #${i+1} haqida e'tiroz bildirish tizimi tez kunda ishga tushadi.`);
                    currentIdx = i; updateUI(); 
                };
                m.appendChild(btn);
            });
        }

        function move(step) {
            currentIdx = Math.max(0, Math.min(questions.length - 1, currentIdx + step));
            updateUI();
        }

        function startTimer() {
            const tBox = document.getElementById('timer');
            const full = timeLeft;
            const timer = setInterval(() => {
                if(timeLeft <= 0 || isDone) { clearInterval(timer); if(!isDone) finalize(); return; }
                timeLeft--;
                let h = Math.floor(timeLeft/3600);
                let m = Math.floor((timeLeft%3600)/60);
                let s = timeLeft%60;
                tBox.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                
                let p = (timeLeft/full)*100;
                tBox.className = `timer-box ${p > 50 ? 't-blue' : (p > 20 ? 't-yellow' : 't-red')}`;
            }, 1000);
        }

        function askFinish() { if(confirm("Testni yakunlaysizmi?")) finalize(); }

        function finalize() {
            isDone = true;
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.ans) score++; });
            let p = Math.round((score/questions.length)*100);
            
            document.getElementById('quizUI').style.display = 'none';
            document.getElementById('navBar').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
            
            document.getElementById('resScore').innerText = `${score} / ${questions.length}`;
            document.getElementById('resPercent').innerText = `${p}%`;
            document.getElementById('resMotivation').innerText = p >= 70 ? "Siz juda aqllisiz! Ajoyib natija!" : "Hali ko'p narsaga qodirsiz, yana bir urinib ko'ring!";
            
            tg.sendData(JSON.stringify({score, total: questions.length, percent: p}));
            updateUI();
        }
    </script>
</body>
</html>
