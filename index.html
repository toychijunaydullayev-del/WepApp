<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rash Tekshiruv Platformasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --primary: #0088cc; --success: #22c55e; --error: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .container { padding: 15px; padding-bottom: 140px; }
        .question-card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .option { background: white; padding: 15px; border-radius: 12px; margin-top: 10px; border: 2px solid #e2e8f0; }
        .option.selected { border-color: var(--primary); background: #f0f9ff; }
        .option.correct-result { border-color: var(--success); background: #dcfce7; color: #166534; }
        .option.wrong-result { border-color: var(--error); background: #fee2e2; color: #991b1b; }
        .ai-btn { background: #8b5cf6; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 10px; width: 100%; font-weight: bold; }
        .ai-response-area { margin-top: 10px; padding: 12px; background: #f5f3ff; border-left: 4px solid #8b5cf6; border-radius: 4px; font-size: 14px; display: none; }
        #resultOverlay { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div id="userName">Test</div>
        <div id="timer" style="font-weight: bold;">00:00</div>
    </div>

    <div class="container" id="quizUI">
        <div class="question-card">
            <div id="qText">Yuklanmoqda...</div>
            <div id="qMedia"></div>
            <div id="options"></div>
        </div>
    </div>

    <div id="resultOverlay">
        <h1 id="resIcon">🏆</h1>
        <h2 id="resPercent">0%</h2>
        <p id="resScore"></p>
        <p id="resMotivation" style="font-style: italic; color: #555;"></p>
        <button onclick="sendToBot()" style="background:var(--success); color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;">Natijani saqlash</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let currentIdx = 0, questions = [], answers = {}, isDone = false;
        const fileName = new URLSearchParams(window.location.search).get('test');

        // Test yuklash
        fetch(`https://raw.githubusercontent.com/toychijunaydullayev-del/WepApp/main/${fileName}`)
            .then(r => r.json())
            .then(data => { questions = data; updateUI(); });

        function updateUI() {
            const q = questions[currentIdx];
            document.getElementById('qText').innerHTML = `<b>${currentIdx+1}.</b> ${q.q}`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            const correctAns = (q.correct || "").toString().toLowerCase().trim();
            const mode = fileName.startsWith("paid") ? "paid" : "free";

            (q.options || []).forEach(val => {
                const item = document.createElement('div');
                item.className = "option " + (answers[currentIdx] === val ? "selected" : "");
                if(isDone) {
                    if(val.toLowerCase() === correctAns) item.className = "option correct-result";
                    else if(answers[currentIdx] === val) item.className = "option wrong-result";
                }
                item.innerText = val;
                item.onclick = () => { if(!isDone) { answers[currentIdx] = val; updateUI(); } };
                optDiv.appendChild(item);
            });

            // AI tugmasi
            if(isDone && answers[currentIdx]?.toLowerCase() !== correctAns) {
                const aiBtn = document.createElement('button');
                aiBtn.className = "ai-btn";
                aiBtn.innerText = "🤖 Ustoz AI dan tahlil so'rash";
                aiBtn.onclick = () => {
                    if(mode === 'free') tg.showAlert("AI tahlili faqat pullik testlarda!");
                    else getAiAnalysis(q.q, answers[currentIdx], correctAns);
                };
                optDiv.appendChild(aiBtn);
                
                const aiRes = document.createElement('div');
                aiRes.id = "aiResponseArea";
                aiRes.className = "ai-response-area";
                optDiv.appendChild(aiRes);
            }
        }

        async function getAiAnalysis(q, u, c) {
            const resArea = document.getElementById('aiResponseArea');
            resArea.style.display = "block";
            resArea.innerText = "O'ylamoqda...";
            
            const prompt = `Savol: ${q}. O'quvchi javobi: ${u}. To'g'ri javob: ${c}. Nima uchun xato? Qisqa tushuntir.`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyBAJgfL8NHxjQRXeA67NmgHsph1x74LVI8`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            resArea.innerHTML = data.candidates[0].content.parts[0].text;
        }

        function finalize() {
            isDone = true;
            let score = 0;
            questions.forEach((q, i) => { if(answers[i]?.toLowerCase() === (q.correct || "").toLowerCase()) score++; });
            let p = Math.round((score / questions.length) * 100);
            
            // Motivatsiya
            let msg = p > 80 ? "Super! Bilimingiz juda yuqori! 🚀" : p > 50 ? "Yaxshi, lekin yana ozgina harakat kerak! 💪" : "Xafa bo'lmang, keyingi safar albatta uddalaysiz! 📚";
            
            document.getElementById('resultOverlay').style.display = 'flex';
            document.getElementById('resPercent').innerText = p + "%";
            document.getElementById('resScore').innerText = score + "/" + questions.length;
            document.getElementById('resMotivation').innerText = msg;
        }

        function sendToBot() { tg.sendData(JSON.stringify({score: 1, total: 1})); tg.close(); }
    </script>
</body>
</html>
