<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rash Tekshiruv Platformasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --q-bg: #e8f5e9; /* Savol uchun och yashil fon */
            --primary: #0088cc;
            --success: #22c55e;
            --error: #ef4444;
            --blue: #3b82f6;
            --yellow: #f59e0b;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 35px; color: rgba(0,0,0,0.03); z-index: -1; font-weight: 900; white-space: nowrap; pointer-events: none; }

        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        
        .user-block { display: flex; flex-direction: column; flex: 1; }
        #userName { font-size: 26px; font-weight: 900; color: #1a1a1a; margin: 0; }
        .sub-text { font-size: 12px; color: #888; }
        
        .timer-container { flex: 1; display: flex; justify-content: center; }
        .timer-box { padding: 6px 15px; border-radius: 12px; color: white; font-weight: bold; font-size: 20px; font-family: monospace; transition: 0.5s; }
        .t-blue { background: var(--blue); }
        .t-yellow { background: var(--yellow); }
        .t-red { background: var(--red); }

        .btn-finish-top { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #eee; max-height: 200px; overflow-y: auto; }
        .matrix-item { aspect-ratio: 1; border-radius: 10px; border: none; background: #e0f2fe; color: #0369a1; font-weight: bold; font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .matrix-item.active { box-shadow: 0 0 0 3px var(--primary); }
        .matrix-item.done { background: var(--success) !important; color: white; }
        .matrix-item.wrong { background: var(--error) !important; color: white; }

        .container { padding: 15px; padding-bottom: 100px; }
        .question-card { background: var(--q-bg); padding: 25px; border-radius: 20px; border: 1px solid #c8e6c9; min-height: 180px; }
        #qText { font-size: 19px; font-weight: 600; line-height: 1.5; color: #1b5e20; }
        
        .option { background: rgba(255,255,255,0.7); padding: 16px; border-radius: 14px; margin-top: 12px; border: 2px solid transparent; transition: 0.2s; font-size: 17px; }
        .option.selected { border-color: var(--primary); background: white; font-weight: bold; }

        .nav-bar { display: flex; gap: 15px; padding: 20px; position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 16px; border-radius: 14px; border: 1px solid #ddd; font-weight: bold; font-size: 16px; cursor: pointer; background: #f9fafb; }
        .btn-next { background: var(--primary); color: white; border: none; }

        #resultPage { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 30px; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .res-badge { font-size: 80px; margin-bottom: 15px; }
        .ai-box { background: #f0fdf4; padding: 20px; border-radius: 15px; font-size: 15px; border: 1px solid #dcfce7; color: #166534; margin-top: 20px; }

        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; font-weight: bold; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div>Yuklanmoqda...</div>
    <div class="watermark">RASH_TEKSHIRUV KANALI</div>

    <div class="header">
        <div class="user-block">
            <div id="userName">Foydalanuvchi</div>
            <div class="sub-text">Rash Tekshiruv</div>
        </div>
        <div class="timer-container"><div id="timer" class="timer-box t-blue">00:00:00</div></div>
        <button class="btn-finish-top" onclick="askFinish()">🏁 Yakunlash</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>

    <div class="container" id="quizUI">
        <div class="question-card">
            <div id="qText">Savol yuklanmoqda...</div>
            <div id="options"></div>
        </div>
        <div class="nav-bar">
            <button class="btn-nav" onclick="move(-1)">⬅️ Oldingi</button>
            <button class="btn-nav btn-next" onclick="move(1)">Keyingi ➡️</button>
        </div>
    </div>

    <div id="resultPage">
        <div class="res-badge" id="resIcon">🎊</div>
        <div id="resScore" style="font-size: 24px; font-weight: 800;">0 / 0</div>
        <div id="resPercent" style="font-size: 40px; font-weight: 900; color: var(--primary);">0%</div>
        <p id="resMotivation" style="font-size: 18px; color: #4b5563;"></p>
        <div class="ai-box">
            🤖 Xatolarni to'g'rilash va qaysi yo'nalishda xato qilganingizni tushunish uchun <b>AI yordamchisiga</b> murojaat qiling.
        </div>
        <button class="btn-next" style="margin-top: 30px; width: 100%; padding: 15px; border-radius: 10px; border:none;" onclick="tg.close()">Botga qaytish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentIdx = 0, questions = [], answers = {}, isDone = false, timeLeft = 0;

        document.getElementById('userName').innerText = tg.initDataUnsafe.user?.first_name || "O'quvchi";

        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if(fileName) {
            fetch(`./${fileName}?v=${Math.random()}`)
                .then(r => r.json())
                .then(data => {
                    questions = data;
                    timeLeft = questions.length * 60;
                    document.getElementById('loader').style.display = 'none';
                    startTimer();
                    updateUI();
                })
                .catch(() => { document.getElementById('loader').innerText = "Fayl topilmadi!"; });
        }

        function updateUI() {
            if(!questions.length) return;
            const q = questions[currentIdx];
            document.getElementById('qText').innerText = `${currentIdx+1}. ${q.t}`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            ['a','b','c','d'].forEach(k => {
                const item = document.createElement('div');
                item.className = `option ${answers[currentIdx] === k.toUpperCase() ? 'selected' : ''}`;
                item.innerText = `${k.toUpperCase()}) ${q[k]}`;
                item.onclick = () => { if(!isDone) { answers[currentIdx] = k.toUpperCase(); updateUI(); } };
                optDiv.appendChild(item);
            });
            renderMatrix();
        }

        function renderMatrix() {
            const m = document.getElementById('matrix');
            m.innerHTML = '';
            questions.forEach((_, i) => {
                const btn = document.createElement('div');
                btn.className = `matrix-item ${i === currentIdx ? 'active' : ''}`;
                if(isDone) btn.classList.add(answers[i] === questions[i].ans ? 'done' : 'wrong');
                else if(answers[i]) btn.classList.add('done');
                btn.innerText = i + 1;
                btn.onclick = () => { 
                    if(isDone) tg.showAlert(`Savol #${i+1}: To'g'ri javob ${questions[i].ans}`);
                    currentIdx = i; updateUI(); 
                };
                m.appendChild(btn);
            });
        }

        function move(s) { currentIdx = Math.max(0, Math.min(questions.length-1, currentIdx+s)); updateUI(); }

        function startTimer() {
            const tBox = document.getElementById('timer'), full = timeLeft;
            const timer = setInterval(() => {
                if(timeLeft <= 0 || isDone) { clearInterval(timer); if(!isDone) finalize(); return; }
                timeLeft--;
                let h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
                tBox.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                let p = (timeLeft/full)*100;
                tBox.className = `timer-box ${p > 50 ? 't-blue' : (p > 20 ? 't-yellow' : 't-red')}`;
            }, 1000);
        }

        function askFinish() { tg.showConfirm("Testni yakunlaysizmi?", (ok) => { if(ok) finalize(); }); }

        function finalize() {
            isDone = true;
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.ans) score++; });
            let p = Math.round((score/questions.length)*100);
            document.getElementById('quizUI').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
            document.getElementById('resScore').innerText = `${score} / ${questions.length}`;
            document.getElementById('resPercent').innerText = `${p}%`;
            document.getElementById('resMotivation').innerText = p >= 70 ? "Barakalla! Siz juda yaxshi natija ko'rsatdingiz!" : "Yana biroz harakat qilsangiz, albatta uddalaysiz!";
            tg.sendData(JSON.stringify({score, total: questions.length, percent: p}));
            updateUI();
        }
    </script>
</body>
</html>
