<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Test Platformasi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --card:#1a2030;--card2:#212840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --primary:#4f7cff;--primary-glow:rgba(79,124,255,0.3);
  --accent:#a78bfa;--success:#34d399;--success-bg:rgba(52,211,153,0.12);
  --error:#f87171;--error-bg:rgba(248,113,113,0.12);
  --text:#e8eaf0;--text2:#8b95b0;--text3:#5a6480;
  --r:16px;--r2:12px;
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.amb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.amb1{width:350px;height:350px;top:-80px;left:-80px;background:rgba(79,124,255,0.07);}
.amb2{width:300px;height:300px;bottom:-60px;right:-60px;background:rgba(167,139,250,0.06);}
#subjectBg{position:fixed;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;font-size:clamp(55px,16vw,120px);font-weight:900;color:rgba(79,124,255,0.025);letter-spacing:4px;user-select:none;pointer-events:none;text-align:center;padding:20px;}

/* LOADING */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.load-ring{width:50px;height:50px;border:3px solid rgba(79,124,255,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;font-weight:600;color:var(--text3);}

/* HEADER */
.header{position:sticky;top:0;z-index:90;background:rgba(15,17,23,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;justify-content:space-between;align-items:center;}
.uinfo{display:flex;align-items:center;gap:10px;min-width:0;}
.uavatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.uname{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.usubj{font-size:11px;font-weight:600;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.timer{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border2);padding:6px 14px;border-radius:24px;font-size:15px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;flex-shrink:0;transition:all .3s;}
.timer svg{width:13px;height:13px;flex-shrink:0;}
.timer.warn{color:var(--error);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.07);}

/* PROGRESS */
.prog-wrap{position:sticky;top:56px;z-index:89;background:rgba(15,17,23,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px 10px;}
.prog-bar{height:3px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .3s ease;}
.qnum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(30px,1fr));gap:4px;}
.qbtn{width:100%;aspect-ratio:1;border:none;border-radius:7px;background:var(--bg3);color:var(--text3);font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.qbtn:hover{background:var(--card2);color:var(--text2);}
.qbtn.answered{background:rgba(52,211,153,0.18);color:var(--success);border-color:rgba(52,211,153,0.25);}
.qbtn.active{border-color:var(--primary);color:var(--primary);background:rgba(79,124,255,0.1);}
.qbtn.correct-mark{background:rgba(52,211,153,0.18);color:var(--success);border-color:rgba(52,211,153,0.25);}
.qbtn.wrong-mark{background:rgba(248,113,113,0.15);color:var(--error);border-color:rgba(248,113,113,0.25);}

/* CONTAINER */
.container{position:relative;z-index:1;padding:16px 16px 140px;max-width:640px;margin:0 auto;}

/* Q CARD */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;animation:fadeUp .2s ease;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--accent));}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.qnum-badge{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--primary);text-transform:uppercase;background:rgba(79,124,255,0.1);padding:4px 10px;border-radius:20px;}
.qtype-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
.qtype-open{background:rgba(167,139,250,0.15);color:var(--accent);}
.qtext{font-size:17px;font-weight:700;line-height:1.7;color:var(--text);}
.qimg{width:100%;border-radius:10px;margin-top:14px;border:1px solid var(--border);max-height:280px;object-fit:contain;}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;font-size:15px;font-weight:600;color:var(--text2);}
.opt:hover{background:var(--card2);border-color:var(--border2);color:var(--text);}
.opt:active{transform:scale(0.985);}
.opt-l{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text3);flex-shrink:0;transition:all .15s;}
.opt.selected{border-color:var(--primary);background:rgba(79,124,255,0.1);color:var(--text);}
.opt.selected .opt-l{background:var(--primary);color:white;}
.opt.correct-r{border-color:var(--success);background:var(--success-bg);color:var(--success);}
.opt.correct-r .opt-l{background:var(--success);color:#0f1117;}
.opt.wrong-r{border-color:var(--error);background:var(--error-bg);color:var(--error);}
.opt.wrong-r .opt-l{background:var(--error);color:white;}
.opt.dim-r{opacity:.28;cursor:default;pointer-events:none;}

/* OPEN ANSWER */
.open-wrap{margin-top:4px;}
.open-ta{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 16px;font-size:15px;font-family:inherit;font-weight:500;color:var(--text);outline:none;resize:none;min-height:110px;transition:border-color .2s;line-height:1.6;}
.open-ta::placeholder{color:var(--text3);}
.open-ta:focus{border-color:var(--primary);}
.open-ta:disabled{border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.06);}
.open-btn{margin-top:8px;width:100%;padding:13px;background:var(--primary);color:white;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.open-btn:hover{background:#6a91ff;}
.open-btn:active{transform:scale(0.98);}
.open-btn:disabled{background:var(--success);cursor:default;}

/* NAV BAR */
.navbar{position:fixed;bottom:0;left:0;right:0;z-index:85;background:rgba(15,17,23,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 16px 24px;display:flex;gap:10px;}
.nbtn{flex:1;padding:13px;border:none;border-radius:var(--r2);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
.nb-prev{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);flex:0 0 80px;}
.nb-prev:hover{background:var(--card2);color:var(--text);}
.nb-next{background:var(--primary);color:white;box-shadow:0 4px 18px rgba(79,124,255,0.35);}
.nb-next:hover{background:#6a91ff;}
.nb-finish{background:var(--success);color:#0f1117;box-shadow:0 4px 18px rgba(52,211,153,0.28);}
.nbtn:active{transform:scale(0.97);}

/* BANNER */
#channelBanner{display:none;position:fixed;bottom:82px;left:16px;right:16px;z-index:200;background:linear-gradient(135deg,#1a2650,#251a50);border:1px solid rgba(79,124,255,0.25);border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideUp .35s cubic-bezier(.34,1.4,.64,1);}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ban-x{position:absolute;top:10px;right:12px;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ban-t{font-size:14px;font-weight:800;color:white;margin-bottom:3px;}
.ban-s{font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);}

/* RESULT */
#resultOverlay{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);flex-direction:column;align-items:center;overflow-y:auto;}
.res-hero{width:100%;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);padding:36px 24px 28px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(79,124,255,0.12) 0%,transparent 70%);pointer-events:none;}
.res-icon{font-size:62px;display:block;margin-bottom:14px;animation:popIn .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.res-pct{font-size:60px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.res-score{font-size:15px;font-weight:600;color:var(--text2);margin-top:8px;}
.res-bar-bg{width:180px;height:5px;background:var(--bg3);border-radius:4px;margin:14px auto 0;overflow:hidden;}
.res-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.res-msg{font-size:13px;color:var(--text2);margin-top:12px;font-style:italic;}
.res-actions{display:flex;gap:10px;padding:14px 16px 0;width:100%;max-width:640px;margin:0 auto;}
.btn-rating{flex:1;padding:12px;background:var(--card);color:var(--primary);border:1px solid rgba(79,124,255,0.25);border-radius:var(--r2);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-rating:hover{background:var(--card2);}
.btn-save{flex:2;padding:12px;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;border:none;border-radius:var(--r2);font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 18px rgba(79,124,255,0.3);}
.btn-save:active{transform:scale(0.98);}
.res-body{width:100%;max-width:640px;margin:0 auto;padding:14px 16px 40px;}
.res-sec-t{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.res-sec-t::after{content:'';flex:1;height:1px;background:var(--border);}
.res-list{display:flex;flex-direction:column;gap:6px;}
.rqi{border-radius:var(--r2);padding:12px 14px;font-size:13px;font-weight:600;line-height:1.5;display:flex;flex-direction:column;gap:5px;border:1px solid transparent;}
.rqi.ok{background:var(--success-bg);border-color:rgba(52,211,153,0.18);}
.rqi.bad{background:var(--error-bg);border-color:rgba(248,113,113,0.18);}
.rqi.opn{background:rgba(79,124,255,0.07);border-color:rgba(79,124,255,0.13);}
.rqi-num{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.rqi-txt{color:var(--text2);font-size:12.5px;}
.rqi-ok{color:var(--success);font-size:12.5px;}
.rqi-err{color:var(--error);font-size:12.5px;}
.ai-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;margin-top:4px;background:rgba(167,139,250,0.13);color:var(--accent);border:1px solid rgba(167,139,250,0.22);border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.ai-btn:hover{background:rgba(167,139,250,0.22);}
.ai-limit{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;margin-top:4px;background:rgba(167,139,250,0.06);color:var(--text3);border:1px solid rgba(167,139,250,0.1);border-radius:8px;font-size:11.5px;font-weight:600;}

/* RATING MODAL */
#ratingModal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.68);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;}
.r-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.s-handle{width:36px;height:4px;background:var(--bg3);border-radius:4px;margin:12px auto 0;}
.s-title{font-size:16px;font-weight:800;color:var(--text);padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.r-tabs{display:flex;gap:6px;padding:12px 16px;}
.rtab{flex:1;padding:8px;border:none;border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all .15s;}
.rtab.active{background:var(--primary);color:white;}
.r-list{flex:1;overflow-y:auto;padding:0 14px 16px;}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:5px;background:var(--card);border:1px solid var(--border);}
.rrow.me{background:rgba(79,124,255,0.09);border-color:rgba(79,124,255,0.22);}
.rrank{width:26px;font-size:16px;text-align:center;flex-shrink:0;}
.rname{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.rscore-v{font-size:13px;font-weight:800;color:var(--primary);}
.rpct-v{font-size:11px;color:var(--text3);}
.s-close{margin:0 16px 14px auto;display:block;background:none;border:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;padding:4px 0;}

/* AI MODAL */
#aiModal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);align-items:flex-end;justify-content:center;}
.ai-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.ai-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.ai-av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#4f7cff);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 14px rgba(124,58,237,0.3);}
.ai-nm{font-size:15px;font-weight:800;color:var(--text);}
.ai-st{font-size:11px;color:var(--success);font-weight:600;display:flex;align-items:center;gap:4px;}
.ai-dot{width:6px;height:6px;background:var(--success);border-radius:50%;}
.ai-ctx{margin:12px 16px 0;background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.6;}
.ai-ctx b{color:var(--text);}
.ai-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.ai-bbl{background:rgba(79,124,255,0.09);border:1px solid rgba(79,124,255,0.13);border-radius:4px 16px 16px 16px;padding:12px 14px;font-size:13.5px;line-height:1.65;color:var(--text);max-width:92%;font-weight:500;}
.ai-bbl b{color:var(--accent);font-weight:700;}
.usr-bbl{align-self:flex-end;background:var(--primary);color:white;border-radius:16px 4px 16px 16px;padding:10px 14px;font-size:13.5px;line-height:1.55;font-weight:500;max-width:85%;}
.ai-typing{display:flex;gap:5px;align-items:center;padding:12px 14px;background:rgba(79,124,255,0.07);border-radius:4px 16px 16px 16px;border:1px solid rgba(79,124,255,0.1);width:fit-content;}
.ai-td{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce .9s infinite;}
.ai-td:nth-child(2){animation-delay:.2s;}
.ai-td:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.ai-inp-row{display:flex;gap:8px;padding:10px 16px 20px;border-top:1px solid var(--border);}
.ai-inp{flex:1;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;font-weight:500;color:var(--text);outline:none;resize:none;min-height:44px;max-height:100px;transition:border-color .2s;}
.ai-inp:focus{border-color:var(--accent);}
.ai-inp::placeholder{color:var(--text3);}
.ai-send{width:44px;height:44px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c3aed,var(--primary));color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(124,58,237,0.3);flex-shrink:0;}
.ai-close{margin:0 16px 0 auto;display:block;background:none;border:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;padding:6px 0;}
</style>
</head>
<body>
<div class="amb amb1"></div>
<div class="amb amb2"></div>
<div id="subjectBg"></div>

<!-- LOADING -->
<div id="loading">
  <div class="load-ring"></div>
  <div class="load-txt">Testlar yuklanmoqda...</div>
</div>

<!-- HEADER -->
<header class="header" id="mainHeader" style="display:none">
  <div class="uinfo">
    <div class="uavatar" id="uav">A</div>
    <div>
      <div class="uname" id="uname">Foydalanuvchi</div>
      <div class="usubj" id="usubj"></div>
    </div>
  </div>
  <div class="timer" id="timerBox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="timerTxt">120:00</span>
  </div>
</header>

<!-- PROGRESS -->
<div class="prog-wrap" id="progWrap" style="display:none">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="qnum-grid" id="qnumGrid"></div>
</div>

<!-- QUIZ -->
<div class="container" id="quizUI" style="display:none">
  <div class="qcard">
    <div class="qmeta">
      <span class="qnum-badge" id="qLabel">SAVOL 1</span>
      <span id="qTypeBadge" class="qtype-badge" style="display:none"></span>
    </div>
    <div class="qtext" id="qText">Yuklanmoqda...</div>
    <img id="qImg" class="qimg" style="display:none" alt=""/>
  </div>
  <div class="opts" id="optWrap"></div>
</div>

<!-- NAV -->
<nav class="navbar" id="navBar" style="display:none">
  <button class="nbtn nb-prev" id="btnPrev" onclick="goTo(currentIdx-1)">← Orqaga</button>
  <button class="nbtn nb-next" id="btnNext">Keyingi →</button>
</nav>

<!-- BANNER -->
<div id="channelBanner">
  <button class="ban-x" onclick="document.getElementById('channelBanner').style.display='none'">✕</button>
  <div class="ban-t">📢 @IshtixonKimyo</div>
  <div class="ban-s">O'zbekistondagi eng yaxshi kimyo kanali! 🔬</div>
</div>

<!-- RESULT -->
<div id="resultOverlay">
  <div class="res-hero">
    <span class="res-icon" id="resIcon">🏆</span>
    <div class="res-pct" id="resPct">0%</div>
    <div class="res-score" id="resSc">0 / 0 to'g'ri</div>
    <div class="res-bar-bg"><div class="res-bar-fill" id="resBarFill" style="width:0%"></div></div>
    <div class="res-msg" id="resMsg"></div>
  </div>
  <div class="res-actions">
    <button class="btn-rating" onclick="openRating()">🏆 Reyting</button>
    <button class="btn-save" onclick="sendToBot()">✅ Natijani saqlash</button>
  </div>
  <div class="res-body">
    <div class="res-sec-t">✅ To'g'ri javoblar</div>
    <div class="res-list" id="correctList"></div>
    <div class="res-sec-t" style="margin-top:22px">❌ Xato javoblar</div>
    <div class="res-list" id="wrongList"></div>
  </div>
</div>

<!-- RATING MODAL -->
<div id="ratingModal" onclick="if(event.target===this)closeRating()">
  <div class="r-sheet">
    <div class="s-handle"></div>
    <div class="s-title">🏆 Top Reyting — <span id="rSubjLbl"></span></div>
    <div class="r-tabs">
      <button class="rtab active" onclick="switchTab('week',this)">📅 Haftalik</button>
      <button class="rtab" onclick="switchTab('month',this)">🗓 Oylik</button>
      <button class="rtab" onclick="switchTab('all',this)">🌐 Umumiy</button>
    </div>
    <div class="r-list" id="ratingList"><div style="text-align:center;padding:30px;color:var(--text3)">⏳ Yuklanmoqda...</div></div>
    <button class="s-close" onclick="closeRating()">✕ Yopish</button>
  </div>
</div>

<!-- AI MODAL -->
<div id="aiModal" onclick="if(event.target===this)closeAI()">
  <div class="ai-sheet">
    <div class="s-handle"></div>
    <div class="ai-hdr">
      <div class="ai-av">🤖</div>
      <div>
        <div class="ai-nm">Ustoz AI</div>
        <div class="ai-st"><span class="ai-dot"></span>Online — tayyor</div>
      </div>
    </div>
    <div id="aiCtx" class="ai-ctx" style="display:none"></div>
    <div class="ai-msgs" id="aiMsgs"></div>
    <button class="ai-close" onclick="closeAI()">✕ Yopish</button>
    <div class="ai-inp-row">
      <textarea class="ai-inp" id="aiInp" placeholder="Savolingizni yozing..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"></textarea>
      <button class="ai-send" onclick="sendAI()">➤</button>
    </div>
  </div>
</div>

<script>
/* ─── GLOBALS ─── */
const tg = window.Telegram.WebApp;
tg.expand(); tg.enableClosingConfirmation();
const GEMINI_KEY = "AIzaSyBAJgfL8NHxjQRXeA67NmgHsph1x74LVI8";
const REPO_RAW   = "https://raw.githubusercontent.com/toychijunaydullayev-del/WepApp/main/";
let questions=[],answers={},currentIdx=0,isDone=false;
let timerSec=0,timerInt=null,finalScore=0;
let ratingPeriod='week',aiUsedFree=0,aiCtxData=null,aiConv=[];
let ratingData={week:[],month:[],all:[]};
const LETTERS=['A','B','C','D','E','F'];
const params=new URLSearchParams(window.location.search);
const fileName=params.get('test')||'';
const mode=fileName.toLowerCase().startsWith('paid')?'paid':'free';
const tgUser=tg.initDataUnsafe?.user;
const userName=tgUser?(tgUser.first_name+(tgUser.last_name?' '+tgUser.last_name:'')):'Foydalanuvchi';

function getSubject(fn){
  if(!fn)return'Test';
  const p=fn.replace('.json','').split('_'),last=p[p.length-1];
  const isTs=/^\d{7,}$/.test(last),parts=isTs?p.slice(2,p.length-1):p.slice(2);
  return parts.join(' ').replace(/_/g,' ').split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
const subjectName=getSubject(fileName);

function getTimerDuration(){
  const l=subjectName.toLowerCase();
  return(l.includes('pedmahorat')||l.includes('ped_mahorat')||l.includes('ped mahorat'))?36*60:120*60;
}

/* INIT */
document.getElementById('uname').textContent=userName;
document.getElementById('uav').textContent=userName.charAt(0).toUpperCase();
document.getElementById('usubj').textContent=subjectName||'';
if(subjectName&&subjectName!=='Test') document.getElementById('subjectBg').textContent=subjectName.toUpperCase();

/* BANNER */
setInterval(()=>{if(!isDone){const b=document.getElementById('channelBanner');b.style.display='block';setTimeout(()=>{b.style.display='none';},60000);}},10*60*1000);

/* LOAD TEST */
fetch(REPO_RAW+fileName)
  .then(r=>{if(!r.ok)throw new Error('Fayl topilmadi');return r.json();})
  .then(data=>{
    questions=data; timerSec=getTimerDuration();
    document.getElementById('loading').style.display='none';
    document.getElementById('mainHeader').style.display='flex';
    document.getElementById('progWrap').style.display='';
    document.getElementById('quizUI').style.display='';
    document.getElementById('navBar').style.display='flex';
    buildQnums(); startTimer(); render();
    if(mode==='paid') setTimeout(()=>tg.showAlert('ℹ️ Bu pullik test. Faqat 1 marta ishlash imkoniyati bor!'),1500);
  })
  .catch(e=>{
    document.getElementById('loading').innerHTML=
      `<div style="text-align:center;padding:32px"><div style="font-size:52px">⚠️</div>
      <p style="margin-top:14px;font-weight:800;color:var(--error);font-size:16px">Test yuklanmadi</p>
      <p style="color:var(--text3);font-size:13px;margin-top:8px">${e.message}</p></div>`;
  });

/* QNUM */
function buildQnums(){
  const g=document.getElementById('qnumGrid'); g.innerHTML='';
  questions.forEach((_,i)=>{
    const b=document.createElement('button'); b.className='qbtn'; b.id=`qn_${i}`;
    b.textContent=i+1; b.onclick=()=>goTo(i); g.appendChild(b);
  }); updateQnums();
}
function updateQnums(){
  const ans=Object.keys(answers).filter(k=>answers[k]!==undefined&&answers[k]!=='').length;
  document.getElementById('progFill').style.width=(ans/questions.length*100)+'%';
  questions.forEach((_,i)=>{
    const b=document.getElementById(`qn_${i}`); if(!b)return;
    b.className='qbtn';
    if(isDone){
      const q=questions[i];
      if((q.type||'test')==='open'){if(answers[i])b.classList.add('answered');}
      else{const c=(q.correct||'').toString().toLowerCase().trim(),g=(answers[i]||'').toString().toLowerCase().trim();
        if(g===c)b.classList.add('correct-mark');else if(g)b.classList.add('wrong-mark');}
    } else if(answers[i]!==undefined&&answers[i]!=='') b.classList.add('answered');
    if(i===currentIdx)b.classList.add('active');
  });
}

/* TIMER */
function startTimer(){
  updateTD();
  timerInt=setInterval(()=>{
    timerSec--; updateTD();
    if(timerSec<=0){clearInterval(timerInt);finalize();}
    if(timerSec<=300)document.getElementById('timerBox').classList.add('warn');
  },1000);
}
function updateTD(){
  const m=String(Math.floor(timerSec/60)).padStart(2,'0'),s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timerTxt').textContent=`${m}:${s}`;
}
function getElapsed(){return getTimerDuration()-timerSec;}

/* RENDER */
function render(){
  if(!questions.length)return;
  const q=questions[currentIdx],total=questions.length;
  const qType=(q.type||'test').toLowerCase().trim(),uAns=answers[currentIdx];
  document.getElementById('qLabel').textContent=`SAVOL ${currentIdx+1} / ${total}`;
  const badge=document.getElementById('qTypeBadge');
  if(qType==='open'){badge.textContent='📝 Ochiq savol';badge.className='qtype-badge qtype-open';badge.style.display='';}
  else badge.style.display='none';
  document.getElementById('qText').innerHTML=q.q||'';
  const img=document.getElementById('qImg');
  if(q.image&&q.image.startsWith('http')){img.src=q.image;img.style.display='block';}else img.style.display='none';
  const wrap=document.getElementById('optWrap'); wrap.innerHTML='';

  if(qType==='open'){
    const d=document.createElement('div'); d.className='open-wrap';
    const ta=document.createElement('textarea'); ta.className='open-ta';
    ta.placeholder='✍️  Javobingizni shu yerga yozing...'; ta.value=uAns!==undefined?uAns:'';
    if(isDone)ta.disabled=true;
    const btn=document.createElement('button'); btn.className='open-btn';
    if(isDone){btn.textContent='✅ Saqlangan';btn.disabled=true;}else btn.innerHTML='💾 Javobni saqlash';
    btn.onclick=()=>{const v=ta.value.trim();if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}answers[currentIdx]=v;btn.textContent='✅ Saqlangan';btn.disabled=true;ta.disabled=true;updateQnums();};
    d.appendChild(ta);d.appendChild(btn);wrap.appendChild(d);
  } else {
    const correct=(q.correct||'').toString().toLowerCase().trim();
    (q.options||[]).forEach((val,i)=>{
      const vs=(val||'').toString(),isSel=uAns===vs,isC=vs.toLowerCase().trim()===correct;
      const d=document.createElement('div'); d.className='opt';
      if(isDone){if(isC)d.classList.add('correct-r');else if(isSel)d.classList.add('wrong-r');else d.classList.add('dim-r');}
      else if(isSel)d.classList.add('selected');
      const lt=document.createElement('span');lt.className='opt-l';lt.textContent=LETTERS[i]||i+1;
      const tx=document.createElement('span');tx.textContent=vs;
      d.appendChild(lt);d.appendChild(tx);
      if(!isDone)d.onclick=()=>{answers[currentIdx]=vs;render();updateQnums();};
      wrap.appendChild(d);
    });
  }

  const btnP=document.getElementById('btnPrev'),btnN=document.getElementById('btnNext');
  btnP.style.visibility=currentIdx===0?'hidden':'visible';
  if(isDone){
    if(currentIdx<total-1){btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=()=>goTo(currentIdx+1);}
    else{btnN.textContent='📊 Saqlash';btnN.className='nbtn nb-finish';btnN.onclick=sendToBot;}
  } else {
    if(currentIdx===total-1){btnN.textContent='✅ Yakunlash';btnN.className='nbtn nb-finish';btnN.onclick=nextOrFinish;}
    else{btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=nextOrFinish;}
  }
  updateQnums(); window.scrollTo({top:0,behavior:'smooth'});
}

/* NAV */
function goTo(i){if(i<0||i>=questions.length)return;currentIdx=i;render();}
function nextOrFinish(){
  if(isDone){goTo(currentIdx+1);return;}
  if(currentIdx<questions.length-1){goTo(currentIdx+1);return;}
  const u=questions.filter((_,i)=>answers[i]===undefined||answers[i]==='').length;
  if(u>0)tg.showConfirm(`⚠️ ${u} ta savolga javob bermagansiz. Yakunlaysizmi?`,ok=>{if(ok)finalize();});
  else finalize();
}

/* FINALIZE */
function finalize(){
  isDone=true; clearInterval(timerInt);
  document.getElementById('channelBanner').style.display='none';
  finalScore=0;
  const cc=questions.filter(q=>(q.type||'test')!=='open').length;
  questions.forEach((q,i)=>{
    if((q.type||'test')==='open')return;
    if((q.correct||'').toString().toLowerCase().trim()===(answers[i]||'').toString().toLowerCase().trim())finalScore++;
  });
  const pct=cc>0?Math.round((finalScore/cc)*100):0;
  let icon,msg;
  if(pct>=90){icon='🏆';msg='Ajoyib natija! Zo\'r bilim! 🚀';}
  else if(pct>=75){icon='🌟';msg='Yaxshi natija! Davom eting! 💪';}
  else if(pct>=50){icon='📈';msg='O\'rtacha natija. Takrorlang! 📚';}
  else{icon='💡';msg='Har urinish o\'stiradi! 🌱';}
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resSc').textContent=`${finalScore} / ${cc} to'g'ri`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('rSubjLbl').textContent=subjectName;
  setTimeout(()=>{document.getElementById('resBarFill').style.width=pct+'%';},200);

  const cL=document.getElementById('correctList'),wL=document.getElementById('wrongList');
  cL.innerHTML='';wL.innerHTML='';
  questions.forEach((q,i)=>{
    const qt=(q.type||'test').toLowerCase(),ca=(q.correct||'').toString(),ua=answers[i]||'';
    const short=(q.q||'').substring(0,110)+((q.q||'').length>110?'...':'');
    if(qt==='open'){
      const d=document.createElement('div');d.className='rqi opn';
      d.innerHTML=`<div class="rqi-num">📝 ${i+1}-savol • Ochiq</div><div class="rqi-txt">${short}</div><div style="color:var(--primary);font-size:12.5px">✍️ Javobingiz: <b>${ua||'Yozilmagan'}</b></div>`;
      cL.appendChild(d);return;
    }
    const isOk=(ua.toString().toLowerCase().trim()===ca.toLowerCase().trim());
    const d=document.createElement('div');d.className=`rqi ${isOk?'ok':'bad'}`;
    d.innerHTML=`<div class="rqi-num">${isOk?'✅':'❌'} ${i+1}-savol</div><div class="rqi-txt">${short}</div>`;
    if(isOk){d.innerHTML+=`<div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;}
    else{
      d.innerHTML+=`<div class="rqi-err">${ua?'❌ Siz: '+ua:'⚪ Javob berilmagan'}</div><div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
      if(mode==='paid'){
        const ab=document.createElement('button');ab.className='ai-btn';ab.innerHTML='🤖 Ustoz AI — tushuntir';
        ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>openAI(qu,u2,c2);})();d.appendChild(ab);
      } else if(aiUsedFree<3){
        const ab=document.createElement('button');ab.className='ai-btn';
        ab.innerHTML=`🤖 Ustoz AI <span style="opacity:.6;font-size:10px">(${3-aiUsedFree} bepul)</span>`;
        ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>{aiUsedFree++;openAI(qu,u2,c2);};})();d.appendChild(ab);
      } else {
        const n=document.createElement('div');n.className='ai-limit';n.textContent='🔒 AI limit tugadi — pullik testlarda cheksiz';d.appendChild(n);
      }
    }
    (isOk?cL:wL).appendChild(d);
  });
  if(!cL.children.length)cL.innerHTML='<div style="color:var(--text3);padding:8px;font-size:13px">—</div>';
  if(!wL.children.length)wL.innerHTML='<div style="color:var(--text2);padding:8px;font-size:13px">🎉 Barcha javoblar to\'g\'ri!</div>';
  document.getElementById('resultOverlay').style.display='flex';
  updateQnums();render();loadRating('week');
}

/* SEND TO BOT */
function sendToBot(){
  const wrong=[];
  const closed=questions.filter((q,i)=>{
    if((q.type||'test')==='open')return false;
    if((q.correct||'').toString().toLowerCase().trim()!==(answers[i]||'').toString().toLowerCase().trim())wrong.push(i+1);
    return true;
  });
  const openAns={};
  questions.forEach((q,i)=>{if((q.type||'test')==='open')openAns[i]=answers[i]||'';});
  tg.sendData(JSON.stringify({action:'test_result',score:finalScore,total:closed.length,subject:subjectName,file_name:fileName,time_sec:getElapsed(),wrong_q:wrong,open_answers:openAns,mode}));
  tg.close();
}

/* RATING */
function openRating(){document.getElementById('ratingModal').style.display='flex';renderRating(ratingPeriod);}
function closeRating(){document.getElementById('ratingModal').style.display='none';}
function switchTab(p,btn){ratingPeriod=p;document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderRating(p);}
function loadRating(p){renderRating(p);}
function renderRating(p){
  const list=document.getElementById('ratingList'),data=ratingData[p]||[];
  if(!data.length){list.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">📊 Ma\'lumotlar yo\'q.<br><small style="opacity:.6">Natijani saqlang — reyting paydo bo\'ladi</small></div>';return;}
  list.innerHTML='';
  data.forEach((row,i)=>{
    const isMe=row.name===userName,d=document.createElement('div');d.className='rrow'+(isMe?' me':'');
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<b style="color:var(--text3)">${i+1}</b>`;
    const pct=row.total>0?Math.round(row.score/row.total*100):0;
    d.innerHTML=`<span class="rrank">${medal}</span><span class="rname">${row.name}${isMe?' <span style="color:var(--primary);font-size:11px">(Siz)</span>':''}</span><div><div class="rscore-v">${row.score}/${row.total}</div><div class="rpct-v">${pct}%</div></div>`;
    list.appendChild(d);
  });
}

/* USTOZ AI */
function openAI(question,userAns,correctAns){
  aiCtxData={question,userAns,correctAns};aiConv=[];
  document.getElementById('aiMsgs').innerHTML='';
  const ctx=document.getElementById('aiCtx');ctx.style.display='block';
  ctx.innerHTML=`<b>📋 Savol:</b> ${(question||'').substring(0,100)}...<br><b style="color:var(--error)">❌ Sizning javobingiz:</b> ${userAns||'Berilmagan'}<br><b style="color:var(--success)">✅ To\'g\'ri javob:</b> ${correctAns}`;
  addBbl(`Assalomu alaykum, <b>${userName}</b>! 👋<br><br>Bu savolni tahlil qilishga tayyorman. Qaysi qismini tushuntirishimni xohlaysiz?`);
  document.getElementById('aiModal').style.display='flex';
  setTimeout(()=>document.getElementById('aiInp').focus(),300);
}
function closeAI(){document.getElementById('aiModal').style.display='none';document.getElementById('aiMsgs').innerHTML='';document.getElementById('aiCtx').style.display='none';aiConv=[];}
function addBbl(html){const c=document.getElementById('aiMsgs'),b=document.createElement('div');b.className='ai-bbl';b.innerHTML=html;c.appendChild(b);c.scrollTop=c.scrollHeight;}
function addUsr(text){const c=document.getElementById('aiMsgs'),b=document.createElement('div');b.className='usr-bbl';b.textContent=text;c.appendChild(b);c.scrollTop=c.scrollHeight;}
function addTyping(){const c=document.getElementById('aiMsgs'),t=document.createElement('div');t.id='aiTyp';t.className='ai-typing';t.innerHTML='<div class="ai-td"></div><div class="ai-td"></div><div class="ai-td"></div>';c.appendChild(t);c.scrollTop=c.scrollHeight;}
function rmTyping(){const t=document.getElementById('aiTyp');if(t)t.remove();}

async function sendAI(){
  const inp=document.getElementById('aiInp'),msg=inp.value.trim();
  if(!msg)return;
  inp.value='';inp.style.height='';
  addUsr(msg);aiConv.push({role:'user',text:msg});addTyping();
  const ctx=aiCtxData||{};
  const sys=`Sen tajribali o'zbek tili ustozisan. Foydalanuvchi ismi: ${userName}.\nSavol: ${ctx.question||''}\nO'quvchi javobi: ${ctx.userAns||'Berilmagan'}\nTo'g'ri javob: ${ctx.correctAns||''}\n\nFoydalanuvchiga "${userName}" deb murojaat qilib, o'zbek tilida, qisqa va aniq tushuntir. Max 5 gap. Markdown ishlatma.`;
  const contents=aiConv.map((c,i)=>{
    if(i===0)return{role:'user',parts:[{text:sys+'\n\nFoydalanuvchi savoli: '+c.text}]};
    return{role:c.role==='user'?'user':'model',parts:[{text:c.text}]};
  });
  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents})});
    const data=await resp.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'Kechirasiz, javob olinmadi.';
    rmTyping();
    addBbl(text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>'));
    aiConv.push({role:'model',text});
  }catch(e){rmTyping();addBbl('⚠️ Tarmoq xatosi. Qaytadan urinib ko\'ring.');}
}

document.getElementById('aiInp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
</script>
</body>
</html>
