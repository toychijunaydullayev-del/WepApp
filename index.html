<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Test Platformasi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c18;
  --bg2:#0d1225;
  --bg3:#141a30;
  --card:#111828;
  --card2:#1a2240;
  --border:rgba(100,140,255,0.12);
  --border2:rgba(100,140,255,0.22);
  --primary:#5b8cff;
  --primary-light:#7aa8ff;
  --primary-glow:rgba(91,140,255,0.4);
  --accent:#c084fc;
  --accent-glow:rgba(192,132,252,0.35);
  --success:#22d87a;
  --success-bg:rgba(34,216,122,0.1);
  --error:#ff5e7a;
  --error-bg:rgba(255,94,122,0.1);
  --warn:#fbbf24;
  --text:#f0f4ff;
  --text2:#8fa4cc;
  --text3:#4a5878;
  --r:18px;
  --r2:14px;
  --r3:10px;
}
html{scroll-behavior:smooth;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ANIMATED MESH BACKGROUND */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(91,140,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 75%, rgba(192,132,252,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 50% 50%, rgba(34,216,122,0.04) 0%, transparent 70%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* GLOWING ORBS */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:orbFloat 12s ease-in-out infinite;}
.orb1{width:500px;height:500px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(91,140,255,0.08) 0%,transparent 70%);animation-delay:0s;}
.orb2{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(192,132,252,0.07) 0%,transparent 70%);animation-delay:-6s;}
.orb3{width:300px;height:300px;top:40%;left:60%;background:radial-gradient(circle,rgba(34,216,122,0.05) 0%,transparent 70%);animation-delay:-3s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}33%{transform:translate(20px,-15px);}66%{transform:translate(-10px,20px);}}

#subjectBg{position:fixed;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;font-size:clamp(40px,14vw,100px);font-weight:900;color:rgba(91,140,255,0.03);letter-spacing:6px;user-select:none;pointer-events:none;text-align:center;padding:20px;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.load-ring-wrap{position:relative;width:64px;height:64px;}
.load-ring{position:absolute;inset:0;border:2px solid transparent;border-top-color:var(--primary);border-right-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;}
.load-ring2{position:absolute;inset:8px;border:2px solid transparent;border-bottom-color:var(--success);border-radius:50%;animation:spin 1.4s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:1px;}
.load-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,100%{content:'.';}33%{content:'..';}66%{content:'...';};}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:90;
  background:rgba(8,12,24,0.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:0 16px;height:60px;
  display:flex;justify-content:space-between;align-items:center;
}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),var(--accent),transparent);opacity:0.4;}
.uinfo{display:flex;align-items:center;gap:10px;min-width:0;}
.uavatar{
  width:36px;height:36px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:white;flex-shrink:0;
  box-shadow:0 0 16px var(--primary-glow);
}
.uname{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.usubj{font-size:11px;font-weight:600;color:var(--primary);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.timer{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);
  border:1px solid var(--border2);
  padding:7px 15px;border-radius:28px;
  font-size:15px;font-weight:800;color:var(--primary);
  font-family:'JetBrains Mono',monospace;
  flex-shrink:0;transition:all .3s;
  box-shadow:0 0 12px rgba(91,140,255,0.15);
}
.timer svg{width:13px;height:13px;flex-shrink:0;}
.timer.warn{color:var(--error);border-color:rgba(255,94,122,0.4);background:rgba(255,94,122,0.06);box-shadow:0 0 16px rgba(255,94,122,0.2);animation:timerPulse 1s ease infinite;}
@keyframes timerPulse{0%,100%{box-shadow:0 0 16px rgba(255,94,122,0.2);}50%{box-shadow:0 0 28px rgba(255,94,122,0.4);}}

/* ── PROGRESS ── */
.prog-wrap{
  position:sticky;top:60px;z-index:89;
  background:rgba(8,12,24,0.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:10px 16px 12px;
}
.prog-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin-bottom:10px;position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--primary-glow);}
.qnum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(32px,1fr));gap:5px;}
.qbtn{
  width:100%;aspect-ratio:1;border:none;border-radius:8px;
  background:rgba(255,255,255,0.04);color:var(--text3);
  font-weight:700;font-size:11px;cursor:pointer;
  transition:all .15s;border:1px solid transparent;
}
.qbtn:hover{background:var(--card2);color:var(--text2);border-color:var(--border);}
.qbtn.answered{background:rgba(34,216,122,0.15);color:var(--success);border-color:rgba(34,216,122,0.3);}
.qbtn.active{border-color:var(--primary);color:var(--primary);background:rgba(91,140,255,0.12);box-shadow:0 0 8px rgba(91,140,255,0.2);}
.qbtn.correct-mark{background:rgba(34,216,122,0.15);color:var(--success);border-color:rgba(34,216,122,0.3);}
.qbtn.wrong-mark{background:rgba(255,94,122,0.12);color:var(--error);border-color:rgba(255,94,122,0.3);}

/* ── CONTAINER ── */
.container{position:relative;z-index:1;padding:16px 16px 140px;max-width:640px;margin:0 auto;}

/* ── Q CARD ── */
.qcard{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:22px;margin-bottom:14px;
  animation:fadeUp .25s ease;
  position:relative;overflow:hidden;
  box-shadow:0 4px 30px rgba(0,0,0,0.4);
}
.qcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--success));
}
.qcard::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(91,140,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qnum-badge{
  font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--primary);
  text-transform:uppercase;
  background:rgba(91,140,255,0.12);
  padding:5px 12px;border-radius:20px;
  border:1px solid rgba(91,140,255,0.2);
}
.qtype-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.qtype-open{background:rgba(192,132,252,0.15);color:var(--accent);border:1px solid rgba(192,132,252,0.25);}
.qtype-key{background:rgba(251,191,36,0.15);color:var(--warn);border:1px solid rgba(251,191,36,0.25);}
.qtext{font-size:17px;font-weight:700;line-height:1.75;color:var(--text);}
.qimg{width:100%;border-radius:12px;margin-top:14px;border:1px solid var(--border);max-height:280px;object-fit:contain;}

/* ── OPTIONS ── */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r2);padding:15px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all .18s;font-size:15px;font-weight:600;color:var(--text2);
  position:relative;overflow:hidden;
}
.opt::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(91,140,255,0.0),transparent);transition:opacity .2s;opacity:0;}
.opt:hover{background:var(--card2);border-color:var(--border2);color:var(--text);transform:translateX(2px);}
.opt:hover::before{opacity:1;}
.opt:active{transform:scale(0.985);}
.opt-l{
  width:32px;height:32px;border-radius:9px;
  background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--text3);
  flex-shrink:0;transition:all .18s;
  border:1px solid var(--border);
}
.opt.selected{border-color:var(--primary);background:rgba(91,140,255,0.1);color:var(--text);}
.opt.selected::before{opacity:1;background:linear-gradient(90deg,rgba(91,140,255,0.06),transparent);}
.opt.selected .opt-l{background:var(--primary);color:white;box-shadow:0 0 12px var(--primary-glow);border-color:transparent;}
.opt.correct-r{border-color:var(--success);background:var(--success-bg);color:var(--success);}
.opt.correct-r .opt-l{background:var(--success);color:#080c18;border-color:transparent;box-shadow:0 0 10px rgba(34,216,122,0.3);}
.opt.wrong-r{border-color:var(--error);background:var(--error-bg);color:var(--error);}
.opt.wrong-r .opt-l{background:var(--error);color:white;border-color:transparent;}
.opt.dim-r{opacity:.2;cursor:default;pointer-events:none;}

/* ── KEY INPUT (yopiq test uchun kalit yozish) ── */
.key-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.key-hint{
  font-size:12px;font-weight:600;color:var(--text3);
  background:rgba(251,191,36,0.07);
  border:1px solid rgba(251,191,36,0.15);
  border-radius:var(--r3);padding:10px 14px;
  display:flex;align-items:flex-start;gap:8px;line-height:1.5;
}
.key-input-row{display:flex;gap:8px;}
.key-inp{
  flex:1;background:var(--card);
  border:1.5px solid var(--border2);
  border-radius:var(--r2);
  padding:14px 16px;font-size:18px;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;color:var(--text);
  outline:none;transition:all .2s;
  letter-spacing:2px;
}
.key-inp::placeholder{color:var(--text3);font-size:14px;letter-spacing:0;font-family:'Sora',sans-serif;font-weight:500;}
.key-inp:focus{border-color:var(--warn);box-shadow:0 0 0 3px rgba(251,191,36,0.1);}
.key-inp:disabled{border-color:rgba(34,216,122,0.3);background:rgba(34,216,122,0.05);color:var(--success);}
.key-save-btn{
  padding:0 18px;background:rgba(251,191,36,0.15);
  color:var(--warn);border:1.5px solid rgba(251,191,36,0.3);
  border-radius:var(--r2);font-size:13px;font-weight:800;
  font-family:inherit;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.key-save-btn:hover{background:rgba(251,191,36,0.25);}
.key-save-btn:active{transform:scale(0.97);}
.key-save-btn:disabled{background:var(--success-bg);color:var(--success);border-color:rgba(34,216,122,0.25);cursor:default;}
.key-result{
  padding:12px 14px;border-radius:var(--r3);
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.key-result.ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,216,122,0.2);}
.key-result.bad{background:var(--error-bg);color:var(--error);border:1px solid rgba(255,94,122,0.2);}

/* ── OPEN ANSWER ── */
.open-wrap{margin-top:4px;}
.open-ta{
  width:100%;background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r2);padding:14px 16px;
  font-size:15px;font-family:inherit;font-weight:500;
  color:var(--text);outline:none;resize:none;
  min-height:110px;transition:border-color .2s;line-height:1.6;
}
.open-ta::placeholder{color:var(--text3);}
.open-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,132,252,0.1);}
.open-ta:disabled{border-color:rgba(34,216,122,0.3);background:rgba(34,216,122,0.04);}
.open-btn{
  margin-top:8px;width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--primary));
  color:white;border:none;border-radius:var(--r2);
  font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .15s;
  box-shadow:0 4px 18px rgba(192,132,252,0.25);
}
.open-btn:hover{opacity:0.9;}
.open-btn:active{transform:scale(0.98);}
.open-btn:disabled{background:var(--success);box-shadow:none;cursor:default;}

/* ── NAV BAR ── */
.navbar{
  position:fixed;bottom:0;left:0;right:0;z-index:85;
  background:rgba(8,12,24,0.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:10px 16px 26px;display:flex;gap:10px;
}
.nbtn{flex:1;padding:14px;border:none;border-radius:var(--r2);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
.nb-prev{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border2);flex:0 0 85px;}
.nb-prev:hover{background:var(--card2);color:var(--text);}
.nb-next{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:white;box-shadow:0 4px 20px var(--primary-glow);
}
.nb-next:hover{box-shadow:0 6px 28px var(--primary-glow);}
.nb-finish{
  background:linear-gradient(135deg,var(--success),#10b981);
  color:#080c18;box-shadow:0 4px 20px rgba(34,216,122,0.3);
}
.nbtn:active{transform:scale(0.97);}

/* ── BANNER ── */
#channelBanner{
  display:none;position:fixed;bottom:86px;left:16px;right:16px;z-index:200;
  background:linear-gradient(135deg,rgba(20,26,48,0.98),rgba(28,18,50,0.98));
  border:1px solid rgba(91,140,255,0.2);
  border-radius:var(--r);padding:14px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
  animation:slideUp .35s cubic-bezier(.34,1.4,.64,1);
}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ban-x{
  position:absolute;top:10px;right:12px;
  background:rgba(255,255,255,0.08);border:none;
  color:rgba(255,255,255,0.5);width:22px;height:22px;
  border-radius:50%;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.ban-t{font-size:14px;font-weight:800;color:white;margin-bottom:3px;}
.ban-s{font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);}

/* ── RESULT ── */
#resultOverlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);flex-direction:column;align-items:center;overflow-y:auto;
}
.res-hero{
  width:100%;
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  padding:36px 24px 28px;text-align:center;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.res-hero::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(91,140,255,0.15) 0%,transparent 70%);
  pointer-events:none;
}
.res-icon{font-size:66px;display:block;margin-bottom:16px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.res-pct{
  font-size:64px;font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;text-shadow:none;
}
.res-score{font-size:15px;font-weight:600;color:var(--text2);margin-top:10px;}
.res-bar-bg{width:200px;height:5px;background:rgba(255,255,255,0.06);border-radius:4px;margin:16px auto 0;overflow:hidden;}
.res-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--primary-glow);}
.res-msg{font-size:13px;color:var(--text2);margin-top:12px;font-style:italic;}
.res-actions{display:flex;gap:10px;padding:16px 16px 0;width:100%;max-width:640px;margin:0 auto;}
.btn-rating{
  flex:1;padding:13px;background:var(--card);
  color:var(--primary);border:1px solid rgba(91,140,255,0.25);
  border-radius:var(--r2);font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:all .15s;
}
.btn-rating:hover{background:var(--card2);}
.btn-save{
  flex:2;padding:13px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border:none;border-radius:var(--r2);
  font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;
  box-shadow:0 4px 20px var(--primary-glow);
}
.btn-save:active{transform:scale(0.98);}
.res-body{width:100%;max-width:640px;margin:0 auto;padding:14px 16px 40px;}
.res-sec-t{
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;
  margin:22px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.res-sec-t::after{content:'';flex:1;height:1px;background:var(--border);}
.res-list{display:flex;flex-direction:column;gap:7px;}
.rqi{
  border-radius:var(--r2);padding:13px 15px;
  font-size:13px;font-weight:600;line-height:1.55;
  display:flex;flex-direction:column;gap:5px;border:1px solid transparent;
}
.rqi.ok{background:var(--success-bg);border-color:rgba(34,216,122,0.15);}
.rqi.bad{background:var(--error-bg);border-color:rgba(255,94,122,0.15);}
.rqi.opn{background:rgba(91,140,255,0.06);border-color:rgba(91,140,255,0.12);}
.rqi.key-q{background:rgba(251,191,36,0.06);border-color:rgba(251,191,36,0.12);}
.rqi-num{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.rqi-txt{color:var(--text2);font-size:12.5px;}
.rqi-ok{color:var(--success);font-size:12.5px;}
.rqi-err{color:var(--error);font-size:12.5px;}
.ai-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;margin-top:6px;
  background:rgba(192,132,252,0.1);color:var(--accent);
  border:1px solid rgba(192,132,252,0.2);border-radius:10px;
  font-size:12px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.ai-btn:hover{background:rgba(192,132,252,0.2);}
.ai-limit{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;margin-top:6px;
  background:rgba(192,132,252,0.04);color:var(--text3);
  border:1px solid rgba(192,132,252,0.08);border-radius:10px;

/* ── RATING MODAL ── */

@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

}
.ai-td:nth-child(2){animation-delay:.2s;}
.ai-td:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

}
</style>
</head>

<!-- RATING MODAL -->
<div id="ratingModal" onclick="if(event.target===this)closeRating()">
  <div class="r-sheet">
    <div class="s-handle"></div>
    <div class="s-title">🏆 Top Reyting — <span id="rSubjLbl"></span></div>
    <div class="r-tabs">
      <button class="rtab active" onclick="switchTab('week',this)">📅 Haftalik</button>
      <button class="rtab" onclick="switchTab('month',this)">🗓 Oylik</button>
      <button class="rtab" onclick="switchTab('all',this)">🌐 Umumiy</button>
    </div>

<!-- AI MODAL -->
<div id="aiModal" onclick="if(event.target===this)closeAI()">
  <div class="ai-sheet">
    <div class="s-handle"></div>
    <div class="ai-hdr">
      <div class="ai-av">🤖</div>
      <div>
        <div class="ai-nm">Ustoz AI</div>
        <div class="ai-st"><span class="ai-dot"></span>Online — tayyor</div>
      </div>
    </div>
    <div id="aiCtx" class="ai-ctx" style="display:none"></div>
    <div class="ai-msgs" id="aiMsgs"></div>
    <button class="ai-close" onclick="closeAI()">✕ Yopish</button>
    <div class="ai-inp-row">
      <textarea class="ai-inp" id="aiInp" placeholder="Savolingizni yozing..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"></textarea>
      <button class="ai-send" onclick="sendAI()">➤</button>
    </div>
  </div>
</div>

<script>
/* ─── GLOBALS ─── */
const tg = window.Telegram?.WebApp || {
  expand:()=>{}, enableClosingConfirmation:()=>{},
  initDataUnsafe:{}, showAlert:(m)=>alert(m),
  showConfirm:(m,cb)=>{cb(confirm(m));},
  sendData:(d)=>console.log(d), close:()=>{}
};
tg.expand(); tg.enableClosingConfirmation();

const REPO_RAW = "https://raw.githubusercontent.com/toychijunaydullayev-del/WepApp/main/";
let questions=[],answers={},currentIdx=0,isDone=false;
let timerSec=0,timerInt=null,finalScore=0;
let ratingPeriod='week',aiUsedFree=0,aiCtxData=null,aiConv=[];
let ratingData={week:[],month:[],all:[]};
const LETTERS=['A','B','C','D','E','F'];
const params=new URLSearchParams(window.location.search);
const fileName=params.get('test')||'';
const mode=fileName.toLowerCase().startsWith('paid')?'paid':'free';
const tgUser=tg.initDataUnsafe?.user;
const userName=tgUser?(tgUser.first_name+(tgUser.last_name?' '+tgUser.last_name:'')):'Foydalanuvchi';

function getSubject(fn){
  if(!fn)return'Test';
  const p=fn.replace('.json','').split('_'),last=p[p.length-1];
  const isTs=/^\d{7,}$/.test(last),parts=isTs?p.slice(2,p.length-1):p.slice(2);
  return parts.join(' ').replace(/_/g,' ').split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
const subjectName=getSubject(fileName);

function getTimerDuration(){
  const l=subjectName.toLowerCase();
  return(l.includes('pedmahorat')||l.includes('ped_mahorat')||l.includes('ped mahorat'))?36*60:120*60;
}

/* INIT */
document.getElementById('uname').textContent=userName;
document.getElementById('uav').textContent=userName.charAt(0).toUpperCase();
document.getElementById('usubj').textContent=subjectName||'';
if(subjectName&&subjectName!=='Test') document.getElementById('subjectBg').textContent=subjectName.toUpperCase();

/* BANNER */
setInterval(()=>{if(!isDone){const b=document.getElementById('channelBanner');b.style.display='block';setTimeout(()=>{b.style.display='none';},60000);}},10*60*1000);

/* LOAD TEST */
fetch(REPO_RAW+fileName)
  .then(r=>{if(!r.ok)throw new Error('Fayl topilmadi');return r.json();})
  .then(data=>{
    questions=data; timerSec=getTimerDuration();
    document.getElementById('loading').style.display='none';
    document.getElementById('mainHeader').style.display='flex';
    document.getElementById('progWrap').style.display='';
    document.getElementById('quizUI').style.display='';
    document.getElementById('navBar').style.display='flex';
    buildQnums(); startTimer(); render();
    if(mode==='paid') setTimeout(()=>tg.showAlert('ℹ️ Bu pullik test. Faqat 1 marta ishlash imkoniyati bor!'),1500);
  })
  .catch(e=>{
    document.getElementById('loading').innerHTML=
      `<div style="text-align:center;padding:32px">
        <div style="font-size:52px">⚠️</div>
        <p style="margin-top:14px;font-weight:800;color:var(--error);font-size:16px">Test yuklanmadi</p>
        <p style="color:var(--text3);font-size:13px;margin-top:8px">${e.message}</p>
      </div>`;
  });

/* QNUM */
function buildQnums(){
  const g=document.getElementById('qnumGrid'); g.innerHTML='';
  questions.forEach((_,i)=>{
    const b=document.createElement('button'); b.className='qbtn'; b.id=`qn_${i}`;
    b.textContent=i+1; b.onclick=()=>goTo(i); g.appendChild(b);
  }); updateQnums();
}
function updateQnums(){
  const ans=Object.keys(answers).filter(k=>answers[k]!==undefined&&answers[k]!=='').length;
  document.getElementById('progFill').style.width=(ans/questions.length*100)+'%';
  questions.forEach((_,i)=>{
    const b=document.getElementById(`qn_${i}`); if(!b)return;
    b.className='qbtn';
    if(isDone){
      const q=questions[i],qt=(q.type||'test').toLowerCase().trim();
      if(qt==='open'||qt==='key'){if(answers[i])b.classList.add('answered');}
      else{
        const c=(q.correct||'').toString().toLowerCase().trim(),g=(answers[i]||'').toString().toLowerCase().trim();
        if(g===c)b.classList.add('correct-mark');else if(g)b.classList.add('wrong-mark');
      }
    } else if(answers[i]!==undefined&&answers[i]!=='') b.classList.add('answered');
    if(i===currentIdx)b.classList.add('active');
  });
}

/* TIMER */
function startTimer(){
  updateTD();
  timerInt=setInterval(()=>{
    timerSec--; updateTD();
    if(timerSec<=0){clearInterval(timerInt);finalize();}
    if(timerSec<=300)document.getElementById('timerBox').classList.add('warn');
  },1000);
}
function updateTD(){
  const m=String(Math.floor(timerSec/60)).padStart(2,'0'),s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timerTxt').textContent=`${m}:${s}`;
}
function getElapsed(){return getTimerDuration()-timerSec;}

/* ─── RENDER ─── */
function render(){
  if(!questions.length)return;
  const q=questions[currentIdx],total=questions.length;
  const qType=(q.type||'test').toLowerCase().trim(),uAns=answers[currentIdx];
  document.getElementById('qLabel').textContent=`SAVOL ${currentIdx+1} / ${total}`;

  const badge=document.getElementById('qTypeBadge');
  if(qType==='open'){
    badge.textContent='📝 Ochiq savol';badge.className='qtype-badge qtype-open';badge.style.display='';
  } else if(qType==='key'){
    badge.textContent='✏️ Javob yozing';badge.className='qtype-badge qtype-key';badge.style.display='';
  } else {
    badge.style.display='none';
  }

  document.getElementById('qText').innerHTML=q.q||'';
  const img=document.getElementById('qImg');
  if(q.image&&q.image.startsWith('http')){img.src=q.image;img.style.display='block';}else img.style.display='none';

  const wrap=document.getElementById('optWrap'); wrap.innerHTML='';

  /* ── OPEN TYPE ── */
  if(qType==='open'){
    const d=document.createElement('div'); d.className='open-wrap';
    const ta=document.createElement('textarea'); ta.className='open-ta';
    ta.placeholder='✍️  Javobingizni shu yerga yozing...'; ta.value=uAns!==undefined?uAns:'';
    if(isDone)ta.disabled=true;
    const btn=document.createElement('button'); btn.className='open-btn';
    if(isDone){btn.textContent='✅ Saqlangan';btn.disabled=true;}else btn.innerHTML='💾 Javobni saqlash';
    btn.onclick=()=>{
      const v=ta.value.trim();
      if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}
      answers[currentIdx]=v;btn.textContent='✅ Saqlangan';btn.disabled=true;ta.disabled=true;updateQnums();
    };
    d.appendChild(ta);d.appendChild(btn);wrap.appendChild(d);

  /* ── KEY TYPE (yopiq test uchun kalit yozish) ── */
  } else if(qType==='key'){
    const kw=document.createElement('div'); kw.className='key-wrap';

    // Hint
    const hint=document.createElement('div'); hint.className='key-hint';
    hint.innerHTML='✏️ <span>Bu yopiq savol. Javobingizni pastda yozing va tekshiring.</span>';
    kw.appendChild(hint);

    // Input row
    const row=document.createElement('div'); row.className='key-input-row';
    const inp=document.createElement('input'); inp.type='text'; inp.className='key-inp';
    inp.placeholder='Javobni kiriting...';
    inp.value=uAns!==undefined?uAns:'';
    if(isDone)inp.disabled=true;

    const saveBtn=document.createElement('button'); saveBtn.className='key-save-btn';
    if(isDone){saveBtn.textContent='✅ OK';saveBtn.disabled=true;}else saveBtn.textContent='💾 Saqlash';
    saveBtn.onclick=()=>{
      const v=inp.value.trim();
      if(!v){tg.showAlert('⚠️ Javob bo\'sh!');return;}
      answers[currentIdx]=v;
      saveBtn.textContent='✅ OK';saveBtn.disabled=true;inp.disabled=true;
      updateQnums();
      // Show result after save
      if(!isDone) showKeyResult(kw,v,q.correct);
    };
    inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();saveBtn.click();}});
    row.appendChild(inp); row.appendChild(saveBtn); kw.appendChild(row);

    // If already done, show result
    if(isDone && uAns!==undefined){
      showKeyResult(kw, uAns, q.correct);
    }

    wrap.appendChild(kw);

  /* ── TEST TYPE (multi-choice) ── */
  } else {
    const correct=(q.correct||'').toString().toLowerCase().trim();
    (q.options||[]).forEach((val,i)=>{
      const vs=(val||'').toString(),isSel=uAns===vs,isC=vs.toLowerCase().trim()===correct;
      const d=document.createElement('div'); d.className='opt';
      if(isDone){
        if(isC)d.classList.add('correct-r');
        else if(isSel)d.classList.add('wrong-r');
        else d.classList.add('dim-r');
      } else if(isSel)d.classList.add('selected');
      const lt=document.createElement('span');lt.className='opt-l';lt.textContent=LETTERS[i]||i+1;
      const tx=document.createElement('span');tx.textContent=vs;
      d.appendChild(lt);d.appendChild(tx);
      if(!isDone)d.onclick=()=>{answers[currentIdx]=vs;render();updateQnums();};
      wrap.appendChild(d);
    });
  }

  const btnP=document.getElementById('btnPrev'),btnN=document.getElementById('btnNext');
  btnP.style.visibility=currentIdx===0?'hidden':'visible';
  if(isDone){
    if(currentIdx<total-1){btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=()=>goTo(currentIdx+1);}
    else{btnN.textContent='📊 Natija';btnN.className='nbtn nb-finish';btnN.onclick=sendToBot;}
  } else {
    if(currentIdx===total-1){btnN.textContent='✅ Yakunlash';btnN.className='nbtn nb-finish';btnN.onclick=nextOrFinish;}
    else{btnN.textContent='Keyingi →';btnN.className='nbtn nb-next';btnN.onclick=nextOrFinish;}
  }
  updateQnums(); window.scrollTo({top:0,behavior:'smooth'});
}

function showKeyResult(container, userVal, correct){
  // Remove existing result
  const ex=container.querySelector('.key-result');
  if(ex)ex.remove();
  if(!correct)return;
  const isOk=userVal.toLowerCase().trim()===correct.toString().toLowerCase().trim();
  const res=document.createElement('div');
  res.className='key-result '+(isOk?'ok':'bad');
  res.innerHTML=isOk
    ? `✅ To'g'ri! Javob: <b>${correct}</b>`
    : `❌ Xato! To'g'ri javob: <b>${correct}</b> | Siz yozdingiz: <b>${userVal}</b>`;
  container.appendChild(res);
}

/* NAV */
function goTo(i){if(i<0||i>=questions.length)return;currentIdx=i;render();}
function nextOrFinish(){
  if(isDone){goTo(currentIdx+1);return;}
  if(currentIdx<questions.length-1){goTo(currentIdx+1);return;}
  const u=questions.filter((_,i)=>answers[i]===undefined||answers[i]==='').length;
  if(u>0)tg.showConfirm(`⚠️ ${u} ta savolga javob bermagansiz. Yakunlaysizmi?`,ok=>{if(ok)finalize();});
  else finalize();
}

/* ─── FINALIZE ─── */
function finalize(){
  isDone=true; clearInterval(timerInt);
  document.getElementById('channelBanner').style.display='none';
  finalScore=0;
  const closed=questions.filter(q=>{
    const qt=(q.type||'test').toLowerCase();
    return qt!=='open';
  });
  const cc=closed.length;
  questions.forEach((q,i)=>{
    const qt=(q.type||'test').toLowerCase();
    if(qt==='open')return;
    if((q.correct||'').toString().toLowerCase().trim()===(answers[i]||'').toString().toLowerCase().trim())finalScore++;
  });
  const pct=cc>0?Math.round((finalScore/cc)*100):0;
  let icon,msg;
  if(pct>=90){icon='🏆';msg='Ajoyib natija! Zo\'r bilim! 🚀';}
  else if(pct>=75){icon='🌟';msg='Yaxshi natija! Davom eting! 💪';}
  else if(pct>=50){icon='📈';msg='O\'rtacha natija. Takrorlang! 📚';}
  else{icon='💡';msg='Har urinish o\'stiradi! 🌱';}
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resSc').textContent=`${finalScore} / ${cc} to'g'ri`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('rSubjLbl').textContent=subjectName;
  setTimeout(()=>{document.getElementById('resBarFill').style.width=pct+'%';},200);

  const cL=document.getElementById('correctList'),wL=document.getElementById('wrongList');
  cL.innerHTML='';wL.innerHTML='';

  questions.forEach((q,i)=>{
    const qt=(q.type||'test').toLowerCase().trim();
    const ca=(q.correct||'').toString(),ua=answers[i]||'';
    const short=(q.q||'').substring(0,110)+((q.q||'').length>110?'...':'');

    if(qt==='open'){
      const d=document.createElement('div');d.className='rqi opn';
      d.innerHTML=`<div class="rqi-num">📝 ${i+1}-savol • Ochiq savol</div>
        <div class="rqi-txt">${short}</div>
        <div style="color:var(--primary);font-size:12.5px">✍️ Javobingiz: <b>${ua||'Yozilmagan'}</b></div>`;
      cL.appendChild(d);return;
    }

    if(qt==='key'){
      const isOk=ua.toLowerCase().trim()===ca.toLowerCase().trim();
      const d=document.createElement('div');d.className=`rqi ${isOk?'ok':'key-q'}`;
      d.innerHTML=`<div class="rqi-num">${isOk?'✅':'✏️'} ${i+1}-savol • Kalit savol</div>
        <div class="rqi-txt">${short}</div>`;
      if(isOk){
        d.innerHTML+=`<div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
        cL.appendChild(d);
      } else {
        d.innerHTML+=`<div class="rqi-err">${ua?'❌ Siz: '+ua:'⚪ Javob berilmagan'}</div>
          <div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
        // AI button for key type
        if(mode==='paid'){
          const ab=document.createElement('button');ab.className='ai-btn';ab.innerHTML='🤖 Ustoz AI — tushuntir';
          ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>openAI(qu,u2,c2);})();d.appendChild(ab);
        } else if(aiUsedFree<3){
          const ab=document.createElement('button');ab.className='ai-btn';
          ab.innerHTML=`🤖 Ustoz AI <span style="opacity:.6;font-size:10px">(${3-aiUsedFree} bepul)</span>`;
          ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>{aiUsedFree++;openAI(qu,u2,c2);};})();d.appendChild(ab);
        } else {
          const n=document.createElement('div');n.className='ai-limit';n.textContent='🔒 AI limit tugadi — pullik testlarda cheksiz';d.appendChild(n);
        }
        wL.appendChild(d);
      }
      return;
    }

    // Normal test question
    const isOk=(ua.toString().toLowerCase().trim()===ca.toLowerCase().trim());
    const d=document.createElement('div');d.className=`rqi ${isOk?'ok':'bad'}`;
    d.innerHTML=`<div class="rqi-num">${isOk?'✅':'❌'} ${i+1}-savol</div><div class="rqi-txt">${short}</div>`;
    if(isOk){
      d.innerHTML+=`<div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
    } else {
      d.innerHTML+=`<div class="rqi-err">${ua?'❌ Siz: '+ua:'⚪ Javob berilmagan'}</div><div class="rqi-ok">✅ To'g'ri: ${ca}</div>`;
      if(mode==='paid'){
        const ab=document.createElement('button');ab.className='ai-btn';ab.innerHTML='🤖 Ustoz AI — tushuntir';
        ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>openAI(qu,u2,c2);})();d.appendChild(ab);
      } else if(aiUsedFree<3){
        const ab=document.createElement('button');ab.className='ai-btn';
        ab.innerHTML=`🤖 Ustoz AI <span style="opacity:.6;font-size:10px">(${3-aiUsedFree} bepul)</span>`;
        ab.onclick=(()=>{const qu=q.q,u2=ua,c2=ca;return()=>{aiUsedFree++;openAI(qu,u2,c2);};})();d.appendChild(ab);
      } else {
        const n=document.createElement('div');n.className='ai-limit';n.textContent='🔒 AI limit tugadi — pullik testlarda cheksiz';d.appendChild(n);
      }
    }
    (isOk?cL:wL).appendChild(d);
  });

  if(!cL.children.length)cL.innerHTML='<div style="color:var(--text3);padding:8px;font-size:13px">—</div>';
  if(!wL.children.length)wL.innerHTML='<div style="color:var(--text2);padding:10px;font-size:13px">🎉 Barcha javoblar to\'g\'ri!</div>';
  document.getElementById('resultOverlay').style.display='flex';
  updateQnums();render();loadRating('week');
}

/* SEND TO BOT */
function sendToBot(){
  const wrong=[];
  const closedQs=questions.filter((q,i)=>{
    const qt=(q.type||'test').toLowerCase();
    if(qt==='open')return false;
    if((q.correct||'').toString().toLowerCase().trim()!==(answers[i]||'').toString().toLowerCase().trim())wrong.push(i+1);
    return true;
  });
  const openAns={};
  questions.forEach((q,i)=>{if((q.type||'test')==='open')openAns[i]=answers[i]||'';});
  tg.sendData(JSON.stringify({action:'test_result',score:finalScore,total:closedQs.length,subject:subjectName,file_name:fileName,time_sec:getElapsed(),wrong_q:wrong,open_answers:openAns,mode}));
  tg.close();
}

/* RATING */
function openRating(){document.getElementById('ratingModal').style.display='flex';renderRating(ratingPeriod);}
function closeRating(){document.getElementById('ratingModal').style.display='none';}
function switchTab(p,btn){ratingPeriod=p;document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderRating(p);}
function loadRating(p){renderRating(p);}
function renderRating(p){
  const list=document.getElementById('ratingList'),data=ratingData[p]||[];
  if(!data.length){
    list.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">📊 Ma\'lumotlar yo\'q.<br><small style="opacity:.6">Natijani saqlang — reyting paydo bo\'ladi</small></div>';
    return;
  }
  list.innerHTML='';
  data.forEach((row,i)=>{
    const isMe=row.name===userName,d=document.createElement('div');d.className='rrow'+(isMe?' me':'');
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<b style="color:var(--text3)">${i+1}</b>`;
    const pct=row.total>0?Math.round(row.score/row.total*100):0;
    d.innerHTML=`<span class="rrank">${medal}</span>
      <span class="rname">${row.name}${isMe?' <span style="color:var(--primary);font-size:11px">(Siz)</span>':''}</span>
      <div><div class="rscore-v">${row.score}/${row.total}</div><div class="rpct-v">${pct}%</div></div>`;
    list.appendChild(d);
  });
}

/* ─── USTOZ AI — Anthropic API ─── */
function openAI(question,userAns,correctAns){
  aiCtxData={question,userAns,correctAns};aiConv=[];
  document.getElementById('aiMsgs').innerHTML='';
  const ctx=document.getElementById('aiCtx');ctx.style.display='block';
  ctx.innerHTML=`<b>📋 Savol:</b> ${(question||'').substring(0,120)}<br>
    <b style="color:var(--error)">❌ Sizning javobingiz:</b> ${userAns||'Berilmagan'}<br>
    <b style="color:var(--success)">✅ To'g'ri javob:</b> ${correctAns}`;
  addBbl(`Assalomu alaykum, <b>${userName}</b>! 👋<br><br>Bu savol bo'yicha tushuntirish berishga tayyorman. Nima so'raysiz?`);
  document.getElementById('aiModal').style.display='flex';
  setTimeout(()=>document.getElementById('aiInp').focus(),300);
}
function closeAI(){
  document.getElementById('aiModal').style.display='none';
  document.getElementById('aiMsgs').innerHTML='';
  document.getElementById('aiCtx').style.display='none';
  aiConv=[];
}
function addBbl(html){
  const c=document.getElementById('aiMsgs'),b=document.createElement('div');
  b.className='ai-bbl';b.innerHTML=html;c.appendChild(b);c.scrollTop=c.scrollHeight;
}
function addUsr(text){
  const c=document.getElementById('aiMsgs'),b=document.createElement('div');
  b.className='usr-bbl';b.textContent=text;c.appendChild(b);c.scrollTop=c.scrollHeight;
}
function addTyping(){
  const c=document.getElementById('aiMsgs'),t=document.createElement('div');
  t.id='aiTyp';t.className='ai-typing';
  t.innerHTML='<div class="ai-td"></div><div class="ai-td"></div><div class="ai-td"></div>';
  c.appendChild(t);c.scrollTop=c.scrollHeight;
}
function rmTyping(){const t=document.getElementById('aiTyp');if(t)t.remove();}

async function sendAI(){
  const inp=document.getElementById('aiInp'),msg=inp.value.trim();
  if(!msg)return;
  inp.value='';inp.style.height='';
  addUsr(msg);
  aiConv.push({role:'user',content:msg});
  addTyping();

  const ctx=aiCtxData||{};
  const systemPrompt=`Sen tajribali o'zbek tili o'qituvchisisisan. Foydalanuvchi ismi: ${userName}.
Hozirda quyidagi test savoli bo'yicha yordam so'ramoqda:

SAVOL: ${ctx.question||''}
O'QUVCHI JAVOBI: ${ctx.userAns||'Berilmagan'}
TO'G'RI JAVOB: ${ctx.correctAns||''}

Qoidalar:
1. Foydalanuvchiga "${userName}" deb murojaat qil
2. O'zbek tilida yoz
3. Qisqa va aniq bo'l (3-5 gap)
4. Nima uchun to'g'ri javob to'g'ri ekanligini tushuntir
5. Xato sababini ham ayt
6. Markdown ishlatma`;

  // Build message history for Anthropic API
  const messages = aiConv.map(m => ({role: m.role, content: m.content}));

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      throw new Error(errData?.error?.message||`HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const text = data?.content?.[0]?.text;

    if(!text) throw new Error('Bo\'sh javob keldi');

    rmTyping();
    const formatted = text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    addBbl(formatted);
    aiConv.push({role:'assistant',content:text});

  } catch(e){
    rmTyping();
    addBbl(`⚠️ Xatolik: ${e.message}. Qaytadan urinib ko'ring.`);
    console.error('AI error:',e);
  }
}

document.getElementById('aiInp').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
