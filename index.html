<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>RASH Tekshiruv</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & BASE ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#eef2ff;
  --card-q:#dde4f7;      /* savol — och xira fon */
  --card-a:rgba(255,255,255,0.55); /* javoblar — shaffof */
  --card-a-border:rgba(255,255,255,0.9);
  --primary:#3b6cf8;
  --primary-d:#2d56d4;
  --success:#16a34a;
  --success-bg:#dcfce7;
  --error:#dc2626;
  --error-bg:#fee2e2;
  --ai:#7c3aed;
  --ai-bg:#f5f3ff;
  --text:#1e2a4a;
  --muted:#64748b;
  --border:rgba(255,255,255,0.7);
  --shadow:0 6px 24px rgba(59,108,248,0.12);
  --r:14px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(circle at 20% 20%,rgba(123,97,255,0.08) 0%,transparent 55%),
                   radial-gradient(circle at 80% 80%,rgba(59,108,248,0.08) 0%,transparent 55%);}

/* ─── LOADING ─────────────────────────────────── */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:46px;height:46px;border:4px solid rgba(59,108,248,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── HEADER ───────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:90;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.6);
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 12px rgba(59,108,248,0.07);
}
.user-name{
  display:flex;align-items:center;gap:7px;
  font-weight:800;font-size:14px;color:var(--text);
  max-width:180px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#3b6cf8,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:900;font-size:13px;flex-shrink:0;
}
.timer-box{
  display:flex;align-items:center;gap:5px;
  background:var(--bg);border:1.5px solid rgba(59,108,248,0.15);
  padding:5px 12px;border-radius:20px;
  font-weight:800;font-size:14px;color:var(--primary);
}
.timer-box.warn{color:var(--error);border-color:rgba(220,38,38,0.3);background:#fff5f5;}

/* ─── QUESTION NUMBERS PANEL ────────────────────── */
.qnum-wrap{
  position:sticky;top:54px;z-index:80;
  background:rgba(255,255,255,0.8);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.6);
  padding:8px 12px;box-shadow:0 2px 8px rgba(59,108,248,0.05);
}
.qnum-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(32px,1fr));
  gap:5px;max-height:180px;overflow-y:auto;
}
/* Show max 5 rows initially, scroll the rest */
.qnum-btn{
  width:100%;aspect-ratio:1;border:none;border-radius:8px;
  background:rgba(59,108,248,0.08);
  color:var(--muted);font-weight:700;font-size:12px;
  cursor:pointer;transition:all .18s;
}
.qnum-btn.answered{background:var(--success);color:white;}
.qnum-btn.active{outline:2.5px solid var(--primary);outline-offset:1px;}
.qnum-btn.correct-mark{background:var(--success);color:white;}
.qnum-btn.wrong-mark{background:var(--error);color:white;}

/* ─── CONTAINER ─────────────────────────────────── */
.container{padding:12px 12px 140px;max-width:600px;margin:0 auto;}

/* ─── QUESTION CARD ─────────────────────────────── */
.q-card{
  background:var(--card-q);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:10px;
  border:1px solid rgba(59,108,248,0.12);
  box-shadow:0 4px 16px rgba(59,108,248,0.08);
  animation:fadeUp .25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.q-label{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--primary);text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:15px;font-weight:600;line-height:1.6;}
.q-img{width:100%;border-radius:10px;margin-top:12px;border:1px solid rgba(59,108,248,0.1);}

/* ─── OPTION ─────────────────────────────────────── */
.options-wrap{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.option{
  background:var(--card-a);
  border:2px solid var(--card-a-border);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border-radius:12px;padding:13px 14px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .18s;
  font-size:14px;font-weight:600;
}
.option:active{transform:scale(0.985);}
.opt-letter{
  min-width:28px;height:28px;border-radius:8px;
  background:rgba(59,108,248,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:var(--primary);flex-shrink:0;
  transition:all .18s;
}
/* answered */
.option.answered-ok{
  border-color:var(--success);
  background:rgba(220,252,231,0.7);
}
.option.answered-ok .opt-letter{background:var(--success);color:white;}

/* result states */
.option.correct-r{border-color:var(--success);background:rgba(220,252,231,0.8);color:var(--success);}
.option.correct-r .opt-letter{background:var(--success);color:white;}
.option.wrong-r{border-color:var(--error);background:rgba(254,226,226,0.8);color:var(--error);}
.option.wrong-r .opt-letter{background:var(--error);color:white;}
.option.dim-r{opacity:.45;cursor:default;}

/* ─── NAV BAR ────────────────────────────────────── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,0.7);
  padding:8px 12px 20px;
  display:flex;gap:8px;
  box-shadow:0 -4px 20px rgba(59,108,248,0.08);
  z-index:85;
}
.btn-nav{
  flex:1;padding:13px;border:none;border-radius:12px;
  font-weight:800;font-size:14px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .18s;
}
.btn-prev{background:rgba(59,108,248,0.08);color:var(--primary);border:2px solid rgba(59,108,248,0.15);}
.btn-next{background:var(--primary);color:white;flex:2;box-shadow:0 4px 14px rgba(59,108,248,0.35);}
.btn-finish{background:var(--success);color:white;flex:2;box-shadow:0 4px 14px rgba(22,163,74,0.35);}
.btn-nav:active{transform:scale(0.97);}

/* ─── MARQUEE (kanal reklama) ─────────────────────── */
.marquee-wrap{
  position:fixed;bottom:68px;left:0;right:0;z-index:84;
  background:rgba(59,108,248,0.08);
  border-top:1px solid rgba(59,108,248,0.12);
  border-bottom:1px solid rgba(59,108,248,0.12);
  padding:4px 0;overflow:hidden;pointer-events:none;
}
.marquee-track{
  display:inline-flex;white-space:nowrap;
  animation:marquee 60s linear infinite;
}
@keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.marquee-item{
  font-size:12px;font-weight:700;color:var(--primary);
  padding:0 24px;
}
.marquee-item span{color:var(--ai);margin-right:4px;}

/* ─── RESULT OVERLAY ──────────────────────────────── */
#resultOverlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(238,242,255,0.97);backdrop-filter:blur(16px);
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:30px 20px 100px;overflow-y:auto;
}
.res-icon{font-size:68px;animation:pop .45s cubic-bezier(.34,1.56,.64,1);margin-bottom:6px;}
@keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.res-pct{font-size:54px;font-weight:900;background:linear-gradient(135deg,#3b6cf8,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:4px 0;}
.res-sc{font-size:17px;font-weight:700;color:var(--muted);}
.res-bar-bg{width:100%;max-width:320px;height:10px;background:rgba(59,108,248,0.1);border-radius:20px;margin:14px auto;overflow:hidden;}
.res-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#3b6cf8,#7c3aed);transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.res-msg{font-size:14.5px;font-style:italic;color:var(--text);margin-bottom:20px;text-align:center;padding:0 10px;}

.res-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin:16px 0 8px;align-self:flex-start;max-width:560px;width:100%;}
.res-q-list{width:100%;max-width:560px;display:flex;flex-direction:column;gap:8px;}
.res-q-item{
  border-radius:12px;padding:12px 14px;font-size:13.5px;font-weight:600;line-height:1.5;
  display:flex;flex-direction:column;gap:6px;
}
.res-q-item.ok{background:var(--success-bg);border:1.5px solid rgba(22,163,74,0.2);}
.res-q-item.bad{background:var(--error-bg);border:1.5px solid rgba(220,38,38,0.2);}
.res-q-num{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;opacity:.7;}
.res-q-correct{color:var(--success);font-size:13px;}
.res-q-user{color:var(--error);font-size:13px;}
.ai-mini-btn{
  background:var(--ai);color:white;border:none;
  padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:700;
  font-family:'Nunito',sans-serif;cursor:pointer;align-self:flex-start;margin-top:4px;
  display:flex;align-items:center;gap:6px;
}
.btn-save-res{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#3b6cf8,#7c3aed);
  color:white;border:none;padding:15px 40px;border-radius:14px;
  font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;
  box-shadow:0 6px 24px rgba(59,108,248,0.35);z-index:201;
  white-space:nowrap;
}
.btn-save-res:active{transform:translateX(-50%) scale(0.97);}

/* ─── USTOZ AI MODAL ──────────────────────────────── */
#aiModal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(30,42,74,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;
}
.ai-sheet{
  background:white;border-radius:24px 24px 0 0;
  width:100%;max-width:600px;
  max-height:85vh;display:flex;flex-direction:column;
  padding:0 0 20px;overflow:hidden;
  animation:sheetUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.ai-handle{width:40px;height:4px;background:#e2e8f0;border-radius:4px;margin:12px auto 0;}
.ai-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-bottom:1px solid #f1f5f9;
}
.ai-robot-wrap{position:relative;}
.ai-robot{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#7c3aed,#3b6cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(124,58,237,0.3);
}
.ai-online{
  position:absolute;bottom:0;right:0;
  width:12px;height:12px;background:#22c55e;
  border:2px solid white;border-radius:50%;
}
.ai-info{}
.ai-name{font-size:15px;font-weight:800;color:var(--text);}
.ai-status{font-size:12px;color:#22c55e;font-weight:600;}
.ai-chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.ai-bubble{
  background:var(--ai-bg);border-radius:0 16px 16px 16px;
  padding:12px 14px;font-size:13.5px;line-height:1.65;color:var(--text);font-weight:600;
  max-width:92%;border:1px solid rgba(124,58,237,0.1);
}
.ai-bubble b{color:var(--ai);}
.ai-user-bubble{
  background:var(--primary);color:white;border-radius:16px 0 16px 16px;
  padding:10px 14px;font-size:13.5px;line-height:1.55;font-weight:600;
  align-self:flex-end;max-width:85%;
}
.ai-typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:var(--ai-bg);border-radius:0 14px 14px 14px;width:fit-content;border:1px solid rgba(124,58,237,0.1);}
.ai-dot{width:7px;height:7px;background:var(--ai);border-radius:50%;animation:bounce .9s infinite;}
.ai-dot:nth-child(2){animation-delay:.2s;}
.ai-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.ai-input-wrap{
  display:flex;gap:8px;padding:10px 14px 0;
  border-top:1px solid #f1f5f9;
}
.ai-input{
  flex:1;border:2px solid rgba(124,58,237,0.2);border-radius:12px;
  padding:10px 14px;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;
  outline:none;resize:none;min-height:44px;max-height:100px;
  color:var(--text);background:var(--ai-bg);
}
.ai-input:focus{border-color:var(--ai);}
.ai-send{
  width:44px;height:44px;border:none;border-radius:12px;
  background:var(--ai);color:white;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 10px rgba(124,58,237,0.3);
}
.ai-close-btn{
  margin:6px 14px 0 auto;display:block;
  background:none;border:none;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;font-family:'Nunito',sans-serif;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-weight:700;color:var(--muted);font-size:14px;">Testlar yuklanmoqda...</div>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none;">
  <div class="user-name">
    <div class="user-avatar" id="userAvatar">A</div>
    <span id="userName">Foydalanuvchi</span>
  </div>
  <div class="timer-box" id="timerBox">⏱ <span id="timerText">00:00</span></div>
</div>

<!-- QUESTION NUMBERS -->
<div class="qnum-wrap" id="qnumWrap" style="display:none;">
  <div class="qnum-grid" id="qnumGrid"></div>
</div>

<!-- MARQUEE KANAL -->
<div class="marquee-wrap" id="marqueeWrap" style="display:none;">
  <div class="marquee-track" id="marqueeTrack"></div>
</div>

<!-- QUIZ -->
<div class="container" id="quizUI" style="display:none;">
  <div class="q-card">
    <div class="q-label" id="qLabel">SAVOL 1</div>
    <div class="q-text" id="qText">Yuklanmoqda...</div>
    <img id="qImg" class="q-img" style="display:none;" alt=""/>
  </div>
  <div class="options-wrap" id="optionsWrap"></div>
</div>

<!-- NAV BAR -->
<div class="nav-bar" id="navBar" style="display:none;">
  <button class="btn-nav btn-prev" id="btnPrev" onclick="goTo(currentIdx-1)">← Oldingi</button>
  <button class="btn-nav btn-next" id="btnNext" onclick="nextOrFinish()">Keyingi →</button>
</div>

<!-- RESULT OVERLAY -->
<div id="resultOverlay">
  <div class="res-icon" id="resIcon">🏆</div>
  <div class="res-pct" id="resPct">0%</div>
  <div class="res-sc" id="resSc">0 / 0 to'g'ri</div>
  <div class="res-bar-bg"><div class="res-bar-fill" id="resBarFill" style="width:0%"></div></div>
  <div class="res-msg" id="resMsg"></div>
  <div class="res-section-title">✅ To'g'ri javoblar</div>
  <div class="res-q-list" id="correctList"></div>
  <div class="res-section-title" style="margin-top:20px;">❌ Xato javoblar</div>
  <div class="res-q-list" id="wrongList"></div>
  <button class="btn-save-res" onclick="sendToBot()">✅ Natijani saqlash</button>
</div>

<!-- USTOZ AI MODAL -->
<div id="aiModal" onclick="closeAIIfOutside(event)">
  <div class="ai-sheet" id="aiSheet">
    <div class="ai-handle"></div>
    <div class="ai-header">
      <div class="ai-robot-wrap">
        <div class="ai-robot">🤖</div>
        <div class="ai-online"></div>
      </div>
      <div class="ai-info">
        <div class="ai-name">Ustoz AI</div>
        <div class="ai-status">● Online — yordam berishga tayyor</div>
      </div>
    </div>
    <div class="ai-chat" id="aiChat"></div>
    <button class="ai-close-btn" onclick="closeAI()">✕ Yopish</button>
    <div class="ai-input-wrap">
      <textarea class="ai-input" id="aiInput" placeholder="Savolingizni yozing..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIMsg();}"></textarea>
      <button class="ai-send" onclick="sendAIMsg()">➤</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   TELEGRAM & GLOBALS
═══════════════════════════════════════════════ */
const tg = window.Telegram.WebApp;
tg.expand();
tg.enableClosingConfirmation();

const GEMINI_KEY = "AIzaSyBAJgfL8NHxjQRXeA67NmgHsph1x74LVI8";
const REPO_RAW   = "https://raw.githubusercontent.com/toychijunaydullayev-del/WepApp/main/";
const CHANNEL    = "@IshtixonKimyo";

let questions  = [];
let answers    = {};
let currentIdx = 0;
let isDone     = false;
let timerSec   = 0;
let timerInt   = null;
let finalScore = 0;

// Fayl nomi va mode
const params   = new URLSearchParams(window.location.search);
const fileName = params.get('test') || '';
const mode     = fileName.toLowerCase().startsWith('paid') ? 'paid' : 'free';

// Foydalanuvchi ismi (Telegram'dan)
const tgUser   = tg.initDataUnsafe?.user;
const userName = tgUser ? (tgUser.first_name + (tgUser.last_name ? ' '+tgUser.last_name : '')) : 'Foydalanuvchi';
const userInitial = userName.charAt(0).toUpperCase();

// Subject nomi
function getSubject(fn){
  if(!fn) return 'Test';
  const p = fn.replace('.json','').split('_');
  const last = p[p.length-1];
  const isTs = /^\d{7,}$/.test(last);
  const parts = isTs ? p.slice(2, p.length-1) : p.slice(2);
  return parts.join(' ').replace(/_/g,' ')
    .split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
const subjectName = getSubject(fileName);
const LETTERS = ['A','B','C','D','E','F'];

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
document.getElementById('userName').textContent  = userName;
document.getElementById('userAvatar').textContent = userInitial;

// Marquee — 24 marta kanal
(function buildMarquee(){
  const track = document.getElementById('marqueeTrack');
  const text = `<span>📢</span> ${CHANNEL} — O'zbekistondagi eng yaxshi kimyo kanali! Hoziroq kuzating! 🔬`;
  let html = '';
  for(let i=0;i<48;i++) html += `<div class="marquee-item"><span>★</span>${text}</div>`;
  track.innerHTML = html;
})();

/* ═══════════════════════════════════════════════
   LOAD TEST
═══════════════════════════════════════════════ */
fetch(REPO_RAW + fileName)
  .then(r=>{ if(!r.ok) throw new Error('Fayl topilmadi'); return r.json(); })
  .then(data=>{
    questions = data;
    document.getElementById('loading').style.display = 'none';
    ['mainHeader','qnumWrap','quizUI','navBar','marqueeWrap']
      .forEach(id=>{ document.getElementById(id).style.display=''; });
    document.getElementById('mainHeader').style.display = 'flex';
    document.getElementById('navBar').style.display     = 'flex';
    document.getElementById('marqueeWrap').style.display = 'block';
    buildQnumGrid();
    startTimer();
    render();
  })
  .catch(e=>{
    document.getElementById('loading').innerHTML=
      `<div style="text-align:center;padding:24px;">
        <div style="font-size:52px;">⚠️</div>
        <p style="margin-top:14px;font-weight:800;color:#dc2626;font-size:16px;">Test yuklanmadi</p>
        <p style="color:#64748b;font-size:13px;margin-top:6px;">${e.message}</p>
       </div>`;
  });

/* ═══════════════════════════════════════════════
   QUESTION NUMBERS GRID
═══════════════════════════════════════════════ */
function buildQnumGrid(){
  const grid = document.getElementById('qnumGrid');
  grid.innerHTML='';
  questions.forEach((_,i)=>{
    const btn = document.createElement('button');
    btn.className='qnum-btn';
    btn.id=`qn_${i}`;
    btn.textContent = i+1;
    btn.onclick = ()=>goTo(i);
    grid.appendChild(btn);
  });
  updateQnumGrid();
}
function updateQnumGrid(){
  questions.forEach((_,i)=>{
    const btn = document.getElementById(`qn_${i}`);
    if(!btn) return;
    btn.className = 'qnum-btn';
    if(isDone){
      const correct = (questions[i].correct||'').toString().toLowerCase().trim();
      const given   = (answers[i]||'').toString().toLowerCase().trim();
      if(given === correct) btn.classList.add('correct-mark');
      else if(given)        btn.classList.add('wrong-mark');
    } else {
      if(answers[i] !== undefined) btn.classList.add('answered');
    }
    if(i === currentIdx) btn.classList.add('active');
  });
}

/* ═══════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════ */
function startTimer(){
  timerInt = setInterval(()=>{
    timerSec++;
    const m = String(Math.floor(timerSec/60)).padStart(2,'0');
    const s = String(timerSec%60).padStart(2,'0');
    document.getElementById('timerText').textContent = `${m}:${s}`;
    if(timerSec > 2700) document.getElementById('timerBox').classList.add('warn');
  },1000);
}

/* ═══════════════════════════════════════════════
   RENDER QUESTION
═══════════════════════════════════════════════ */
function render(){
  if(!questions.length) return;
  const q       = questions[currentIdx];
  const total   = questions.length;
  const correct = (q.correct||'').toString().toLowerCase().trim();
  const userAns = answers[currentIdx];

  document.getElementById('qLabel').textContent = `SAVOL ${currentIdx+1} / ${total}`;
  document.getElementById('qText').innerHTML    = q.q || '';

  // Rasm
  const imgEl = document.getElementById('qImg');
  if(q.image && q.image.startsWith('http')){
    imgEl.src = q.image; imgEl.style.display='block';
  } else { imgEl.style.display='none'; }

  // Options
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  (q.options||[]).forEach((val,i)=>{
    const valStr = (val||'').toString();
    const valLow = valStr.toLowerCase().trim();
    const isSelected = userAns === valStr;
    const isCorrect  = valLow === correct;

    const div = document.createElement('div');
    div.className = 'option';

    if(isDone){
      if(isCorrect)        div.classList.add('correct-r');
      else if(isSelected)  div.classList.add('wrong-r');
      else                 div.classList.add('dim-r');
    } else if(isSelected){
      div.classList.add('answered-ok');
    }

    const lt = document.createElement('span');
    lt.className = 'opt-letter';
    lt.textContent = LETTERS[i]||i+1;

    const tx = document.createElement('span');
    tx.textContent = valStr;

    div.appendChild(lt); div.appendChild(tx);
    if(!isDone){
      div.onclick=()=>{ answers[currentIdx]=valStr; render(); updateQnumGrid(); };
    }
    wrap.appendChild(div);
  });

  // Nav tugmalari
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.style.visibility = currentIdx===0 ? 'hidden':'visible';

  if(isDone){
    btnNext.textContent = currentIdx<total-1 ? 'Keyingi →':'📊 Natijani saqlash';
    btnNext.className   = currentIdx<total-1 ? 'btn-nav btn-next':'btn-nav btn-finish';
    if(currentIdx===total-1) btnNext.onclick = sendToBot;
    else btnNext.onclick = ()=>goTo(currentIdx+1);
  } else {
    if(currentIdx===total-1){
      btnNext.textContent = '✅ Testni yakunlash';
      btnNext.className   = 'btn-nav btn-finish';
      btnNext.onclick     = nextOrFinish;
    } else {
      btnNext.textContent = 'Keyingi →';
      btnNext.className   = 'btn-nav btn-next';
      btnNext.onclick     = nextOrFinish;
    }
  }

  updateQnumGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function goTo(idx){
  if(idx<0||idx>=questions.length) return;
  currentIdx=idx; render();
}
function nextOrFinish(){
  if(isDone){ goTo(currentIdx+1); return; }
  if(currentIdx < questions.length-1){ goTo(currentIdx+1); return; }
  const unanswered = questions.length - Object.keys(answers).length;
  if(unanswered>0){
    tg.showConfirm(`⚠️ ${unanswered} ta savolga javob bermagansiz. Shunga qaramasdan yakunlaysizmi?`,
      ok=>{ if(ok) finalize(); });
  } else { finalize(); }
}

/* ═══════════════════════════════════════════════
   FINALIZE
═══════════════════════════════════════════════ */
function finalize(){
  isDone = true;
  clearInterval(timerInt);
  finalScore = 0;
  const total = questions.length;

  questions.forEach((q,i)=>{
    const c = (q.correct||'').toString().toLowerCase().trim();
    const g = (answers[i]||'').toString().toLowerCase().trim();
    if(g===c) finalScore++;
  });

  const pct = total>0 ? Math.round((finalScore/total)*100) : 0;
  let icon,msg;
  if(pct>=90){icon='🏆';msg='Ajoyib natija! Bilimingiz zo\'r darajada! 🚀';}
  else if(pct>=75){icon='🌟';msg='Yaxshi! Yana biroz mashq va mukammal bo\'lasiz! 💪';}
  else if(pct>=50){icon='📈';msg='O\'rtacha natija. Ko\'proq takrorlash tavsiya etiladi! 📚';}
  else{icon='💡';msg='Xafa bo\'lmang! Har bir urinish sizni o\'stiradi! 🌱';}

  document.getElementById('resIcon').textContent = icon;
  document.getElementById('resPct').textContent  = pct+'%';
  document.getElementById('resSc').textContent   = `${finalScore} / ${total} to'g'ri`;
  document.getElementById('resMsg').textContent  = msg;

  // To'g'ri/xato savollar ro'yxati
  const correctList = document.getElementById('correctList');
  const wrongList   = document.getElementById('wrongList');
  correctList.innerHTML=''; wrongList.innerHTML='';

  questions.forEach((q,i)=>{
    const correctAns = (q.correct||'').toString();
    const userAns    = (answers[i]||'');
    const given      = userAns.toString().toLowerCase().trim();
    const correct2   = correctAns.toLowerCase().trim();
    const isOk       = given===correct2;

    const div = document.createElement('div');
    div.className = `res-q-item ${isOk?'ok':'bad'}`;

    const num = document.createElement('div');
    num.className = 'res-q-num';
    num.textContent = `${isOk?'✅':'❌'} ${i+1}-savol`;

    const qtext = document.createElement('div');
    qtext.style.cssText='font-size:13px;line-height:1.5;';
    qtext.innerHTML = (q.q||'').substring(0,120) + ((q.q||'').length>120?'...':'');

    div.appendChild(num);
    div.appendChild(qtext);

    if(isOk){
      const c = document.createElement('div');
      c.className='res-q-correct';
      c.textContent = `✅ To'g'ri: ${correctAns}`;
      div.appendChild(c);
    } else {
      const ua = document.createElement('div');
      ua.className='res-q-user';
      ua.textContent = userAns ? `❌ Siz: ${userAns}` : '⚪ Javob berilmagan';
      const ca = document.createElement('div');
      ca.className='res-q-correct';
      ca.textContent = `✅ To'g'ri: ${correctAns}`;
      div.appendChild(ua);
      div.appendChild(ca);

      // AI tugmasi
      const aib = document.createElement('button');
      aib.className='ai-mini-btn';
      aib.innerHTML='🤖 Ustoz AI';
      aib.onclick=(()=>{
        const qi=i;
        return ()=>openAI(questions[qi].q, userAns, correctAns);
      })();
      div.appendChild(aib);
    }
    (isOk?correctList:wrongList).appendChild(div);
  });

  if(correctList.children.length===0) correctList.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px;">—</div>';
  if(wrongList.children.length===0)   wrongList.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px;">Barcha savollar to\'g\'ri! 🎉</div>';

  document.getElementById('resultOverlay').style.display='flex';
  setTimeout(()=>{ document.getElementById('resBarFill').style.width=pct+'%'; },200);

  updateQnumGrid();
  render(); // Nav ni yangilash
}

/* ═══════════════════════════════════════════════
   SEND TO BOT
═══════════════════════════════════════════════ */
function sendToBot(){
  const wrong=[];
  questions.forEach((q,i)=>{
    const c=(q.correct||'').toString().toLowerCase().trim();
    const g=(answers[i]||'').toString().toLowerCase().trim();
    if(g!==c) wrong.push(i+1);
  });
  tg.sendData(JSON.stringify({
    action:'test_result', score:finalScore,
    total:questions.length, subject:subjectName,
    file_name:fileName, time_sec:timerSec, wrong_q:wrong
  }));
  tg.close();
}

/* ═══════════════════════════════════════════════
   USTOZ AI MODAL
═══════════════════════════════════════════════ */
let aiCurrentQ='', aiCurrentU='', aiCurrentC='';

function openAI(q, userAns, correctAns){
  aiCurrentQ = q||'';
  aiCurrentU = userAns||'';
  aiCurrentC = correctAns||'';

  const chat = document.getElementById('aiChat');
  chat.innerHTML='';

  // Bot salomlashadi
  addAIBubble(
    `Assalomu alaykum, <b>${userName}</b>! 👋<br><br>` +
    `Men <b>Ustoz AI</b> — sizga testdagi qiyin savollarni tushuntirishga yordam beraman.<br><br>` +
    `Siz qaysi savolning qaysi qismini tushunmadingiz? Qanday yordam kerak?`
  );

  // Savol haqida izoh
  if(q){
    addAIBubble(
      `📋 <b>Siz tanlagan savol:</b><br>${q.substring(0,120)}${q.length>120?'...':''}<br><br>`+
      `<b>Sizning javobingiz:</b> ${userAns||'Javob berilmagan'}<br>`+
      `<b>To'g'ri javob:</b> ${correctAns}`
    );
  }

  document.getElementById('aiModal').style.display='flex';
  document.getElementById('aiInput').focus();
}
function closeAI(){
  document.getElementById('aiModal').style.display='none';
  document.getElementById('aiChat').innerHTML='';
}
function closeAIIfOutside(e){
  if(e.target===document.getElementById('aiModal')) closeAI();
}

function addAIBubble(html){
  const chat = document.getElementById('aiChat');
  const b = document.createElement('div');
  b.className='ai-bubble';
  b.innerHTML=html;
  chat.appendChild(b);
  chat.scrollTop=chat.scrollHeight;
}
function addUserBubble(text){
  const chat=document.getElementById('aiChat');
  const b=document.createElement('div');
  b.className='ai-user-bubble';
  b.textContent=text;
  chat.appendChild(b);
  chat.scrollTop=chat.scrollHeight;
}
function addTyping(){
  const chat=document.getElementById('aiChat');
  const t=document.createElement('div');
  t.id='aiTyping';t.className='ai-typing';
  t.innerHTML='<div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>';
  chat.appendChild(t);
  chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){
  const t=document.getElementById('aiTyping');
  if(t) t.remove();
}

async function sendAIMsg(){
  const inp=document.getElementById('aiInput');
  const userMsg=inp.value.trim();
  if(!userMsg) return;
  inp.value='';
  addUserBubble(userMsg);

  addTyping();

  const systemCtx = aiCurrentQ
    ? `Savol: ${aiCurrentQ}\nO'quvchi javobi: ${aiCurrentU}\nTo'g'ri javob: ${aiCurrentC}\n\n`
    : '';

  const prompt =
    `Sen tajribali o'zbek tili ustozisan. Foydalanuvchi ismi: ${userName}.\n`+
    systemCtx+
    `Foydalanuvchi savoli: ${userMsg}\n\n`+
    `Foydalanuvchiga "${userName}" deb murojaat qilib, o'zbek tilida, qisqa, ilmiy va tushunarli javob ber. 3-5 gapdan oshmasin.`;

  try{
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}) }
    );
    const data = await resp.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Kechirasiz, javob olinmadi.';
    removeTyping();
    addAIBubble(text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>'));
  } catch(e){
    removeTyping();
    addAIBubble('⚠️ Xatolik yuz berdi. Qaytadan urinib ko\'ring.');
  }
}
</script>
